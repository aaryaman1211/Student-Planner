<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Student Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f7;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 32px 24px;
            width: 100%; max-width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    p  { font-size: 14px; color: #666; margin-bottom: 24px; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ddd;
            border-radius: 10px; font-size: 16px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #534AB7; }
    button { width: 100%; padding: 13px; background: #534AB7; color: white;
             border: none; border-radius: 10px; font-size: 16px;
             font-weight: 500; cursor: pointer; margin-bottom: 12px; }
    .link { text-align: center; font-size: 14px; color: #666; }
    .link a { color: #534AB7; text-decoration: none; }
    #msg { text-align: center; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📚 Student Planner</h1>
    <p>Create your account</p>
    <input type="text"     id="name"     placeholder="Your name" />
    <input type="email"    id="email"    placeholder="Email" />
    <input type="password" id="password" placeholder="Password (min 6 chars)" />
    <button onclick="signup()">Sign Up</button>
    <div class="link">Already have an account? <a href="login.html">Login</a></div>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBV0D7YQVZxwmCzF2DOqgXCwMMQCwC9eKo",
        authDomain: "student-planner-ca092.firebaseapp.com",
        projectId: "student-planner-ca092",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signup = async function() {
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg      = document.getElementById("msg");
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        msg.style.color = "green";
        msg.textContent = "Account created! Go to login.";
        setTimeout(() => window.location.href = "login.html", 1500);
      } catch (err) {
        msg.style.color = "red";
        msg.textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
