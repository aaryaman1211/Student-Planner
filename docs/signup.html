<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Student Planner">
  <link rel="manifest" href="manifest.json">
  <title>Sign Up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; min-height: 100vh;
           background: linear-gradient(145deg, #6C5CE7 0%, #a29bfe 100%);
           display: flex; align-items: center; justify-content: center; padding: 24px; }
    @keyframes up { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .card { background: white; border-radius: 28px; padding: 36px 28px;
            width: 100%; max-width: 380px;
            box-shadow: 0 24px 60px rgba(108,92,231,0.3);
            animation: up 0.5s ease both; }
    .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 700; text-align: center; color: #1a1a2e; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 28px; }
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-wrap label { font-size: 12px; font-weight: 600; color: #6C5CE7;
                        text-transform: uppercase; letter-spacing: 0.05em;
                        display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #f0efff;
            border-radius: 14px; font-size: 16px; outline: none;
            background: #fafafa; color: #1a1a2e; transition: all 0.2s; }
    input:focus { border-color: #6C5CE7; background: white; }
    button { width: 100%; padding: 16px; margin-top: 8px;
             background: linear-gradient(135deg, #6C5CE7, #a29bfe);
             color: white; border: none; border-radius: 14px;
             font-size: 16px; font-weight: 600; cursor: pointer;
             transition: transform 0.15s, box-shadow 0.15s;
             box-shadow: 0 8px 24px rgba(108,92,231,0.3); }
    button:active { transform: scale(0.97); }
    .link { text-align: center; margin-top: 20px; font-size: 14px; color: #6b7280; }
    .link a { color: #6C5CE7; font-weight: 600; text-decoration: none; }
    #msg { text-align: center; font-size: 13px; margin-top: 12px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>Create Account</h1>
    <div class="sub">Start planning your studies</div>
    <div class="input-wrap">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="Aaryaman" />
    </div>
    <div class="input-wrap">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com" />
    </div>
    <div class="input-wrap">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" />
    </div>
    <button onclick="signup()">Create Account</button>
    <div class="link">Already have an account? <a href="login.html">Login</a></div>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBV0D7YQVZxwmCzF2DOqgXCwMMQCwC9eKo",
      authDomain: "student-planner-ca092.firebaseapp.com",
      projectId: "student-planner-ca092"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signup = async function() {
      const name     = document.getElementById("name").value.trim();
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg      = document.getElementById("msg");
      const btn      = document.querySelector("button");

      if (!name) { msg.style.color = "red"; msg.textContent = "Please enter your name"; return; }

      btn.textContent = "Creating account...";
      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        // ✅ Save name to Firebase profile
        await updateProfile(result.user, { displayName: name });
        msg.style.color = "#00B894";
        msg.textContent = "Account created! Redirecting...";
        setTimeout(() => window.location.href = "login.html", 1200);
      } catch (err) {
        msg.style.color = "red";
        msg.textContent = "Error: " + err.message;
        btn.textContent = "Create Account";
      }
    }
  </script>
</body>
</html>
