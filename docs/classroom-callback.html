<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Connecting...</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;}
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-dashed { border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 4px; transform: rotate(0.2deg); }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .animate-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  </style>
</head>
<body class="text-zinc-50">
  <div class="wobbly-box p-8 w-full max-w-[400px] text-center animate-up" id="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title" class="text-xl font-bold chalk-text mb-2">Connecting to Classroom</h2>
    <p id="subtitle" class="text-sm chalk-dim mb-6">Fetching your assignments...</p>
    <div id="content" class="text-left max-h-[50vh] overflow-y-auto overflow-x-hidden pr-2"></div>
    <div id="status" class="text-sm text-red-400 font-bold mt-4 min-h-[18px]"></div>
  </div>

  <script>
    const CLIENT_ID  = "270374829098-2qbl40fhje1bcl211os09ou09ugg21d1.apps.googleusercontent.com", SCOPES = "https://www.googleapis.com/auth/classroom.coursework.me.readonly https://www.googleapis.com/auth/classroom.courses.readonly";
    const user = JSON.parse(localStorage.getItem("user")); if (!user) window.location.href = "login.html";
    let allAssignments = [], accessToken = null;

    function getTokenFromHash() { const hash = window.location.hash.substring(1), params = new URLSearchParams(hash); return params.get("access_token"); }
    async function fetchCourses(token) { const res = await fetch("https://classroom.googleapis.com/v1/courses?courseStates=ACTIVE", { headers: { Authorization: "Bearer " + token } }); const data = await res.json(); return data.courses || []; }
    async function fetchAssignments(token, courseId, courseName) {
      const res = await fetch(`https://classroom.googleapis.com/v1/courses/${courseId}/courseWork?orderBy=dueDate`, { headers: { Authorization: "Bearer " + token } }); const data = await res.json();
      return (data.courseWork || []).map(a => {
        let dueDate = null; if (a.dueDate) { dueDate = `${a.dueDate.year}-${String(a.dueDate.month).padStart(2, "0")}-${String(a.dueDate.day).padStart(2, "0")}`; }
        return { id: a.id, title: a.title, course: courseName, dueDate: dueDate, courseId: courseId };
      });
    }

    function renderAssignments(assignments) {
      document.getElementById("spinner").style.display = "none"; document.getElementById("title").textContent = "Select assignments to import"; document.getElementById("subtitle").textContent = `Found ${assignments.length} assignments across your courses`;
      const content = document.getElementById("content"), today = new Date(); today.setHours(0,0,0,0);
      const filtered = assignments.filter(a => { if (!a.dueDate) return true; return new Date(a.dueDate) >= today; });
      if (!filtered.length) { content.innerHTML = '<div class="chalk-dashed p-6 text-center chalk-dim text-sm">No upcoming assignments found</div>'; return; }
      filtered.sort((a, b) => { if (!a.dueDate && !b.dueDate) return 0; if (!a.dueDate) return 1; if (!b.dueDate) return -1; return new Date(a.dueDate) - new Date(b.dueDate); });

      content.innerHTML = `
        <div class="flex justify-between mb-4">
          <button onclick="selectAll()" class="text-[10px] font-bold tracking-widest uppercase border border-white/20 px-2 py-1 rounded hover:bg-white/10 wobbly-box">Select all</button>
          <button onclick="selectNone()" class="text-[10px] font-bold tracking-widest uppercase border border-white/20 px-2 py-1 rounded hover:bg-white/10 wobbly-box">Deselect all</button>
        </div>
        <div id="list" class="space-y-3 mb-6"></div>
        <button onclick="importSelected()" class="w-full import-btn wobbly-box p-4 font-bold chalk-text hover:bg-white/10 hover:-rotate-1 transition-all active:scale-95">Import Selected</button>`;

      const list = document.getElementById("list");
      filtered.forEach((a, i) => {
        const div = document.createElement("div"); div.className = `wobbly-box p-4 flex items-start gap-3 cursor-pointer hover:bg-white/5 transition-colors ${i%2===0 ? 'rotate-0.5' : '-rotate-0.5'}`;
        div.onclick = () => { const cb = div.querySelector("input"); cb.checked = !cb.checked; };
        div.innerHTML = `
          <input type="checkbox" id="cb_${i}" checked onclick="event.stopPropagation()" class="mt-1 w-4 h-4 bg-transparent border-2 border-white/40 rounded focus:ring-0 text-white cursor-pointer" />
          <div class="flex-1">
            <div class="text-sm chalk-text font-bold leading-tight">${a.title}</div>
            <div class="text-xs chalk-dim mt-1">📚 ${a.course}</div>
            ${a.dueDate ? `<div class="text-[10px] font-bold tracking-widest uppercase mt-2 text-emerald-300">Due: ${a.dueDate}</div>` : `<div class="text-[10px] font-bold tracking-widest uppercase mt-2 text-red-400">No due date</div>`}
          </div>`;
        list.appendChild(div);
      });
      allAssignments = filtered;
    }

    function selectAll() { document.querySelectorAll("#list input[type='checkbox']").forEach(cb => cb.checked = true); }
    function selectNone() { document.querySelectorAll("#list input[type='checkbox']").forEach(cb => cb.checked = false); }

    async function importSelected() {
      const status = document.getElementById("status"), btn = document.querySelector(".import-btn"), checkboxes = document.querySelectorAll("#list input[type='checkbox']"), selected = [];
      checkboxes.forEach((cb, i) => { if (cb.checked) selected.push(allAssignments[i]); });
      if (!selected.length) { status.textContent = "Please select at least one assignment"; return; }
      const today = new Date(); today.setDate(today.getDate() + 7); const defaultDate = today.toISOString().split("T")[0];
      btn.textContent = `Importing ${selected.length}...`; btn.disabled = true; let imported = 0;

      for (const a of selected) {
        try { await fetch("https://web-production-dc086.up.railway.app/assignments", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ title: a.title, subjectName: a.course, dueDate: a.dueDate || defaultDate, userId: user.uid }) }); imported++; } catch (e) { console.error("Failed to import:", a.title); }
      }

      document.getElementById("card").innerHTML = `
        <div class="text-5xl mb-4 text-emerald-400">✅</div>
        <h2 class="text-xl font-bold chalk-text mb-2">Imported ${imported} assignments!</h2>
        <p class="text-sm chalk-dim mb-8">They're now in your planner.</p>
        <button onclick="window.location.href='dashboard.html'" class="w-full wobbly-box p-4 font-bold chalk-text hover:bg-white/10 hover:rotate-1 transition-all">Go to Dashboard</button>`;
    }

    async function init() {
      accessToken = getTokenFromHash();
      if (!accessToken) { window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent("https://aaryaman1211.github.io/student-planner/classroom-callback.html")}&response_type=token&scope=${encodeURIComponent(SCOPES)}&prompt=select_account`; return; }
      try {
        document.getElementById("subtitle").textContent = "Fetching your courses..."; const courses = await fetchCourses(accessToken);
        document.getElementById("subtitle").textContent = `Found ${courses.length} courses, fetching assignments...`; const allWork = [];
        for (const course of courses) { const work = await fetchAssignments(accessToken, course.id, course.name); allWork.push(...work); }
        const aRes = await fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`), existing = await aRes.json(), existingTitles = new Set(existing.map(a => a.title.toLowerCase().trim())), dismissed = JSON.parse(localStorage.getItem("dismissedAssignments") || "[]");
        const newOnly = allWork.filter(a => !existingTitles.has(a.title.toLowerCase().trim()) && !dismissed.includes(a.title.toLowerCase().trim()));
        if (!newOnly.length) {
          document.getElementById("spinner").style.display = "none"; document.getElementById("title").textContent = "All caught up! ✅"; document.getElementById("subtitle").textContent = "No new assignments to import";
          document.getElementById("content").innerHTML = `<button onclick="window.location.href='dashboard.html'" class="w-full mt-4 wobbly-box p-4 font-bold chalk-text hover:bg-white/10 hover:rotate-1 transition-all">Back to Dashboard</button>`; return;
        }
        renderAssignments(newOnly);
      } catch (err) { document.getElementById("spinner").style.display = "none"; document.getElementById("title").textContent = "Something went wrong"; document.getElementById("subtitle").textContent = err.message; console.error(err); }
    }
    if (accessToken) { localStorage.setItem("classroomToken", accessToken); localStorage.setItem("classroomTokenTime", Date.now().toString()); }
    init();
  </script>
</body>
</html>
