<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Assignment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f7;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 28px 24px;
            width: 100%; max-width: 380px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ddd;
            border-radius: 10px; font-size: 16px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #534AB7; }
    button { width: 100%; padding: 13px; background: #534AB7; color: white;
             border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    .back { display: block; text-align: center; margin-top: 12px;
            font-size: 14px; color: #534AB7; text-decoration: none; }
    #msg { text-align: center; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📝 Add Assignment</h1>
    <label>Title</label>
    <input type="text" id="title" placeholder="e.g. Maths Chapter 5 HW" />
    <label>Subject</label>
    <input type="text" id="subject" placeholder="e.g. Mathematics" />
    <label>Due date</label>
    <input type="date" id="dueDate" />
    <button onclick="save()">Save Assignment</button>
    <a href="assignments.html" class="back">← Back</a>
    <div id="msg"></div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function save() {
      const title   = document.getElementById("title").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const dueDate = document.getElementById("dueDate").value;
      const msg     = document.getElementById("msg");

      if (!title || !subject || !dueDate) {
        msg.style.color = "red";
        msg.textContent = "Please fill all fields";
        return;
      }

      const res = await fetch("https://web-production-dc086.up.railway.app/assignments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title,
          subjectName: subject,
          dueDate,
          userId: user.uid
        })
      });

      if (res.ok) {
        msg.style.color = "green";
        msg.textContent = "Saved!";
        setTimeout(() => window.location.href = "assignments.html", 1000);
      } else {
        msg.style.color = "red";
        msg.textContent = "Something went wrong";
      }
    }
  </script>
</body>
</html>
