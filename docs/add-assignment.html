<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Add Assignment</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    input { background: transparent; border: 2px dashed rgba(255,255,255,0.3); border-radius: 4px; color: rgba(255,255,255,0.85); padding: 16px; outline: none; transition: all 0.2s; width: 100%; transform: rotate(0.2deg); }
    input:focus { border-style: solid; border-color: rgba(255,255,255,0.6); transform: rotate(0deg); background: rgba(255,255,255,0.05); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .animate-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="text-zinc-50">
  <div class="bg-zinc-950 flex items-center gap-4 px-6 pt-12 pb-6 border-b-4 border-zinc-200/20 z-40 sticky top-0 animate-up">
    <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center border-2 border-white/20 rounded wobbly-box hover:bg-white/10 transition-all font-bold">←</button>
    <h1 class="text-xl font-bold chalk-text">New Assignment</h1>
  </div>
  
  <div class="max-w-screen-xl mx-auto px-6 mt-8 animate-up" style="animation-delay: 0.1s;">
    <div class="mb-5">
      <label class="block text-[11px] font-bold chalk-dim uppercase tracking-widest mb-2">Title</label>
      <input type="text" id="title" placeholder="e.g. Maths HW Chapter 5" />
    </div>
    <div class="mb-5">
      <label class="block text-[11px] font-bold chalk-dim uppercase tracking-widest mb-2">Subject</label>
      <input type="text" id="subject" placeholder="e.g. Mathematics" />
    </div>
    <div class="mb-8">
      <label class="block text-[11px] font-bold chalk-dim uppercase tracking-widest mb-2">Due Date</label>
      <input type="date" id="dueDate" />
    </div>
    <button onclick="save()" id="btn" class="w-full wobbly-box p-4 font-bold chalk-text hover:bg-white/10 hover:rotate-1 transition-all active:scale-95">Save Assignment</button>
    <div id="msg" class="text-center text-sm mt-4 min-h-[18px] font-bold"></div>
  </div>
  <script>
    const user = JSON.parse(localStorage.getItem("user")); if (!user) window.location.href = "login.html";
    async function save() {
      const title = document.getElementById("title").value.trim(), subject = document.getElementById("subject").value.trim(), dueDate = document.getElementById("dueDate").value, msg = document.getElementById("msg"), btn = document.getElementById("btn");
      if (!title || !subject || !dueDate) { msg.style.color="#FF6B6B"; msg.textContent="Please fill all fields"; return; }
      btn.textContent = "Saving...";
      const res = await fetch("https://web-production-dc086.up.railway.app/assignments", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ title, subjectName: subject, dueDate, userId: user.uid }) });
      if (res.ok) { msg.style.color="#00D4A8"; msg.textContent="✓ Saved!"; setTimeout(() => window.location.href="assignments.html", 800); } else { msg.style.color="#FF6B6B"; msg.textContent="Something went wrong"; btn.textContent="Save Assignment"; }
    }
  </script>
</body>
</html>
