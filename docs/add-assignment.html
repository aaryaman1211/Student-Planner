<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Add Assignment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #F0EFFA;
           min-height: 100vh; }
    @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .header { background: linear-gradient(135deg, #6C5CE7, #a29bfe);
              padding: 56px 20px 24px; display: flex; align-items: center; gap: 14px; }
    .back { background: rgba(255,255,255,0.2); border: none; color: white;
            width: 38px; height: 38px; border-radius: 12px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 700; color: white; }

    .form { padding: 24px 20px; animation: up 0.4s ease both; }
    .field { margin-bottom: 20px; }
    label { font-size: 12px; font-weight: 700; color: #6C5CE7;
            text-transform: uppercase; letter-spacing: 0.06em;
            display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #e9e8ff;
            border-radius: 14px; font-size: 16px; outline: none;
            background: white; color: #1a1a2e; transition: all 0.2s; }
    input:focus { border-color: #6C5CE7; }
    .save-btn { width: 100%; padding: 16px;
                background: linear-gradient(135deg, #6C5CE7, #a29bfe);
                color: white; border: none; border-radius: 14px;
                font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;
                box-shadow: 0 8px 24px rgba(108,92,231,0.3);
                transition: transform 0.15s; }
    .save-btn:active { transform: scale(0.97); }
    #msg { text-align: center; font-size: 14px; margin-top: 14px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back" onclick="history.back()">←</button>
    <h1>New Assignment</h1>
  </div>

  <div class="form">
    <div class="field">
      <label>Title</label>
      <input type="text" id="title" placeholder="e.g. Maths Chapter 5 HW" />
    </div>
    <div class="field">
      <label>Subject</label>
      <input type="text" id="subject" placeholder="e.g. Mathematics" />
    </div>
    <div class="field">
      <label>Due Date</label>
      <input type="date" id="dueDate" />
    </div>
    <button class="save-btn" onclick="save()">Save Assignment</button>
    <div id="msg"></div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function save() {
      const title   = document.getElementById("title").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const dueDate = document.getElementById("dueDate").value;
      const msg     = document.getElementById("msg");
      const btn     = document.querySelector(".save-btn");

      if (!title || !subject || !dueDate) {
        msg.style.color = "#ef4444"; msg.textContent = "Please fill all fields"; return;
      }
      btn.textContent = "Saving...";
      const res = await fetch("https://web-production-dc086.up.railway.app/assignments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, subjectName: subject, dueDate, userId: user.uid })
      });
      if (res.ok) {
        msg.style.color = "#00B894"; msg.textContent = "✓ Saved!";
        setTimeout(() => window.location.href = "assignments.html", 800);
      } else {
        msg.style.color = "#ef4444"; msg.textContent = "Something went wrong";
        btn.textContent = "Save Assignment";
      }
    }
  </script>
</body>
</html>
