<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Student Planner - Login</title>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/student-planner/service-worker.js', { scope: '/student-planner/' }).catch(err => console.warn('SW failed:', err));
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    input { background: transparent; border: 2px dashed rgba(255,255,255,0.3); border-radius: 4px; color: rgba(255,255,255,0.85); padding: 16px; outline: none; transition: all 0.2s; width: 100%; transform: rotate(0.2deg); }
    input:focus { border-style: solid; border-color: rgba(255,255,255,0.6); transform: rotate(0deg); background: rgba(255,255,255,0.05); }
    @keyframes up { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    .animate-up { animation: up 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="text-zinc-50">
  <div class="wobbly-box p-8 w-full max-w-[380px] animate-up -rotate-1">
    <div class="text-5xl text-center mb-4">📚</div>
    <h1 class="text-2xl font-bold text-center chalk-text mb-1">Student Planner</h1>
    <div class="text-sm chalk-dim text-center mb-8">Welcome back</div>

    <div class="mb-5">
      <label class="block text-[11px] font-bold chalk-dim uppercase tracking-widest mb-2">Email</label>
      <input type="email" id="email" placeholder="you@email.com" />
    </div>
    <div class="mb-5">
      <label class="block text-[11px] font-bold chalk-dim uppercase tracking-widest mb-2">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <div class="flex items-center gap-3 mb-6">
      <input type="checkbox" id="keepSignedIn" class="w-5 h-5 bg-transparent border-2 border-white/40 rounded focus:ring-0 text-white cursor-pointer" />
      <label for="keepSignedIn" class="text-sm chalk-dim cursor-pointer font-medium">Keep me signed in</label>
    </div>

    <button onclick="login()" id="btn" class="w-full wobbly-box p-4 font-bold chalk-text hover:bg-white/10 hover:-rotate-1 transition-all active:scale-95">Login</button>
    <div class="text-center mt-6 text-sm chalk-dim">No account? <a href="signup.html" class="chalk-text font-bold underline decoration-white/30 hover:decoration-white">Sign up</a></div>
    <div id="msg" class="text-center text-sm text-red-400 mt-4 min-h-[18px] font-bold"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    const firebaseConfig = { apiKey: "AIzaSyBV0D7YQVZxwmCzF2DOqgXCwMMQCwC9eKo", authDomain: "student-planner-ca092.firebaseapp.com", projectId: "student-planner-ca092" };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const keepSignedIn = localStorage.getItem("keepSignedIn") === "true";
    const savedUser    = localStorage.getItem("user");
    if (keepSignedIn && savedUser) {
      onAuthStateChanged(auth, async (firebaseUser) => {
        if (firebaseUser) {
          try {
            const token = await firebaseUser.getIdToken();
            const res = await fetch("https://web-production-dc086.up.railway.app/auth/verify", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token }) });
            if (res.ok) {
              const user = await res.json();
              user.name  = firebaseUser.displayName || "Student"; user.email = firebaseUser.email;
              localStorage.setItem("user", JSON.stringify(user)); window.location.href = "dashboard.html";
            }
          } catch (err) { console.error("Auto login failed", err); }
        }
      });
    } else { signOut(auth); localStorage.removeItem("user"); }

    window.login = async function() {
      const email = document.getElementById("email").value.trim(), password = document.getElementById("password").value, keep = document.getElementById("keepSignedIn").checked, msg = document.getElementById("msg"), btn = document.getElementById("btn");
      if (!email || !password) { msg.textContent = "Please enter your email and password"; return; }
      btn.textContent = "Logging in..."; msg.textContent = "";
      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        const token  = await result.user.getIdToken();
        const res = await fetch("https://web-production-dc086.up.railway.app/auth/verify", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token }) });
        if (res.ok) {
          const user = await res.json(); user.name = result.user.displayName || "Student"; user.email = result.user.email;
          localStorage.setItem("user", JSON.stringify(user)); localStorage.setItem("keepSignedIn", keep ? "true" : "false");
          window.location.href = "dashboard.html";
        } else { msg.textContent = "Server error — try again"; btn.textContent = "Login"; }
      } catch (err) { msg.textContent = "Login failed: " + err.message; btn.textContent = "Login"; }
    }
  </script>
</body>
</html>
