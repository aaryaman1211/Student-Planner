<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>Account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:rgba(28, 27, 41, 0.85); --card-hover:#222133; --p:#7C6FF7; --p2:#a29bfe;
            --t:#00D4A8; --text:#FFFFFE; --sub:#A7A9BE; --border:rgba(255,255,255,0.08); }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text);
           padding-bottom: max(100px, calc(80px + env(safe-area-inset-bottom))); overflow-x: hidden; }
           
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .a1 { animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .a2 { animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) .1s both; }
    .a3 { animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) .2s both; }

    .header { background: var(--bg); padding: max(64px, calc(44px + env(safe-area-inset-top))) 20px 80px;
              text-align: center; position: relative; }
    .header::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
                      width: 400px; height: 400px; background: radial-gradient(circle, rgba(124,111,247,0.2) 0%, transparent 60%);
                      border-radius: 50%; filter: blur(30px); z-index: 0; }
    .avatar-big { width: 96px; height: 96px; border-radius: 32px;
                  background: linear-gradient(135deg, var(--p), var(--p2));
                  display: flex; align-items: center; justify-content: center;
                  font-size: 40px; font-weight: 800; color: white;
                  margin: 0 auto 16px; border: 4px solid rgba(255,255,255,0.1);
                  box-shadow: 0 15px 40px rgba(124,111,247,0.4), inset 0 2px 5px rgba(255,255,255,0.3);
                  position: relative; z-index: 1; }
    .user-name  { font-size: 26px; font-weight: 800; color: white; letter-spacing: -0.5px; position: relative; z-index: 1; margin-bottom: 4px; }
    .user-email { font-size: 15px; color: rgba(255,255,255,0.6); position: relative; z-index: 1; font-weight: 500; }

    .content { padding: 0 20px 20px; margin-top: -30px; position: relative; z-index: 2; }

    .stats-row { display: flex; gap: 12px; margin-bottom: 32px; }
    .stat { flex: 1; background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px; padding: 20px 10px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .stat-num   { font-size: 32px; font-weight: 800; color: var(--p); line-height: 1; margin-bottom: 6px; }
    .stat-done  { color: var(--t); }
    .stat-label { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }

    .section { margin-bottom: 24px; }
    .section-title { font-size: 13px; font-weight: 800; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding: 0 8px; }
    .row-group { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .row { border-bottom: 1px solid var(--border); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
    .row:last-child { border-bottom: none; }
    .row:active { background: rgba(255,255,255,0.05); }
    .row-label { font-size: 16px; font-weight: 600; color: var(--text); }
    .row-value { font-size: 15px; color: var(--sub); font-weight: 500; }

    .logout-btn { width: 100%; padding: 18px; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); color: #FF6B6B; border-radius: 20px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 16px; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 4px 15px rgba(255,107,107,0.1); }
    .logout-btn:active { transform: scale(0.96); background: rgba(255,107,107,0.2); }

    /* Glass Bottom Nav */
    .bnav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,19,34,0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 0 max(20px, env(safe-area-inset-bottom)); display: flex; z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.3); }
    .bnav a { flex: 1; display: flex; flex-direction: column; align-items: center; text-decoration: none; gap: 5px; transition: transform 0.2s; }
    .bnav a:active { transform: scale(0.85); }
    .bnav-icon  { font-size: 22px; filter: grayscale(100%) opacity(0.6); transition: all 0.3s ease; }
    .bnav-label { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s ease; }
    .bnav a.active .bnav-icon { filter: grayscale(0%) opacity(1); transform: translateY(-2px); }
    .bnav a.active .bnav-label { color: var(--p2); }
  </style>
</head>
<body>
  <div class="header a1">
    <div class="avatar-big" id="avatar">A</div>
    <div class="user-name"  id="userName">Loading...</div>
    <div class="user-email" id="userEmail"></div>
  </div>

  <div class="content">
    <div class="stats-row a2">
      <div class="stat">
        <div class="stat-num" id="totalA">—</div>
        <div class="stat-label">Tasks</div>
      </div>
      <div class="stat">
        <div class="stat-num stat-done" id="doneA">—</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalE">—</div>
        <div class="stat-label">Exams</div>
      </div>
    </div>

    <div class="section a3">
      <div class="section-title">Personal Details</div>
      <div class="row-group">
        <div class="row"><span class="row-label">Name</span><span class="row-value" id="rowName">—</span></div>
        <div class="row"><span class="row-label">Email</span><span class="row-value" id="rowEmail">—</span></div>
      </div>
    </div>

    <div class="section a3">
      <div class="section-title">About App</div>
      <div class="row-group">
        <div class="row"><span class="row-label">Version</span><span class="row-value">2.0 UI Upgrade</span></div>
        <div class="row"><span class="row-label">Backend</span><span class="row-value">Spring Boot</span></div>
      </div>
    </div>

    <button class="logout-btn a3" onclick="logout()">Log Out</button>
  </div>

  <nav class="bnav">
    <a href="dashboard.html"><span class="bnav-icon">🏠</span><span class="bnav-label">Home</span></a>
    <a href="assignments.html"><span class="bnav-icon">📝</span><span class="bnav-label">Tasks</span></a>
    <a href="exams.html"><span class="bnav-icon">📅</span><span class="bnav-label">Exams</span></a>
    <a href="account.html" class="active"><span class="bnav-icon">👤</span><span class="bnav-label">Account</span></a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    const name  = user.name  || "Student";
    const email = user.email || "";
    document.getElementById("avatar").textContent    = name.charAt(0).toUpperCase();
    document.getElementById("userName").textContent  = name;
    document.getElementById("userEmail").textContent = email;
    document.getElementById("rowName").textContent   = name;
    document.getElementById("rowEmail").textContent  = email;

    async function loadStats() {
      try {
        const [aRes, eRes] = await Promise.all([
          fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`),
          fetch(`https://web-production-dc086.up.railway.app/exams/${user.uid}`)
        ]);
        const assignments = await aRes.json();
        const exams       = await eRes.json();
        document.getElementById("totalA").textContent = assignments.length;
        document.getElementById("doneA").textContent  = assignments.filter(a => a.completed).length;
        document.getElementById("totalE").textContent = exams.length;
      } catch(e) {}
    }

    function logout() {
      if (!confirm("Are you sure you want to log out?")) return;
      localStorage.clear();
      window.location.href = "login.html";
    }
    loadStats();
  </script>
</body>
</html>
