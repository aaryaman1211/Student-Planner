<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Add Exam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #F0EFFA; min-height: 100vh; }
    @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .header { background: linear-gradient(135deg, #00B894, #55efc4);
              padding: 56px 20px 24px; display: flex; align-items: center; gap: 14px; }
    .back { background: rgba(255,255,255,0.2); border: none; color: white;
            width: 38px; height: 38px; border-radius: 12px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .header h1 { font-size: 20px; font-weight: 700; color: white; }

    .form { padding: 24px 20px; animation: up 0.4s ease both; }
    .field { margin-bottom: 20px; }
    label { font-size: 12px; font-weight: 700; color: #00B894;
            text-transform: uppercase; letter-spacing: 0.06em;
            display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #e0f7f3;
            border-radius: 14px; font-size: 16px; outline: none;
            background: white; color: #1a1a2e; transition: all 0.2s; }
    input:focus { border-color: #00B894; }

    .ch-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .ch-row  { display: flex; gap: 8px; align-items: center; }
    .ch-row input { margin-bottom: 0; flex: 1; }
    .ch-del { background: #fee2e2; border: none; color: #ef4444;
              width: 36px; height: 36px; border-radius: 10px; font-size: 16px;
              cursor: pointer; flex-shrink: 0; }

    .add-ch { width: 100%; padding: 12px; background: #e0f7f3; color: #00B894;
              border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
              cursor: pointer; margin-bottom: 20px; transition: transform 0.15s; }
    .add-ch:active { transform: scale(0.97); }

    .save-btn { width: 100%; padding: 16px;
                background: linear-gradient(135deg, #00B894, #55efc4);
                color: white; border: none; border-radius: 14px;
                font-size: 16px; font-weight: 600; cursor: pointer;
                box-shadow: 0 8px 24px rgba(0,184,148,0.3);
                transition: transform 0.15s; }
    .save-btn:active { transform: scale(0.97); }
    #msg { text-align: center; font-size: 14px; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back" onclick="history.back()">←</button>
    <h1>New Exam</h1>
  </div>

  <div class="form">
    <div class="field">
      <label>Exam Title</label>
      <input type="text" id="title" placeholder="e.g. Physics Unit Test" />
    </div>
    <div class="field">
      <label>Subject</label>
      <input type="text" id="subject" placeholder="e.g. Physics" />
    </div>
    <div class="field">
      <label>Exam Date</label>
      <input type="date" id="examDate" />
    </div>
    <div class="field">
      <label>Chapters / Portion</label>
      <div class="ch-list" id="chapters">
        <div class="ch-row">
          <input type="text" placeholder="e.g. Chapter 1 - Motion" class="ch-input" />
          <button class="ch-del" onclick="removeCh(this)">×</button>
        </div>
      </div>
      <button class="add-ch" onclick="addChapter()">+ Add chapter</button>
    </div>
    <button class="save-btn" onclick="save()">Save Exam</button>
    <div id="msg"></div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    function addChapter() {
      const div = document.createElement("div");
      div.className = "ch-row";
      div.innerHTML = `<input type="text" placeholder="e.g. Chapter 2 - Force" class="ch-input" />
                       <button class="ch-del" onclick="removeCh(this)">×</button>`;
      document.getElementById("chapters").appendChild(div);
    }

    function removeCh(btn) {
      const rows = document.querySelectorAll(".ch-row");
      if (rows.length > 1) btn.parentElement.remove();
    }

    async function save() {
      const title    = document.getElementById("title").value.trim();
      const subject  = document.getElementById("subject").value.trim();
      const examDate = document.getElementById("examDate").value;
      const msg      = document.getElementById("msg");
      const btn      = document.querySelector(".save-btn");

      const portion = Array.from(document.querySelectorAll(".ch-input"))
        .map(i => i.value.trim()).filter(v => v)
        .map(name => ({ name, completed: false }));

      if (!title || !subject || !examDate) {
        msg.style.color = "#ef4444"; msg.textContent = "Please fill title, subject and date"; return;
      }
      btn.textContent = "Saving...";
      const res = await fetch("https://web-production-dc086.up.railway.app/exams", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, subjectName: subject, examDate, userId: user.uid, portion })
      });
      if (res.ok) {
        msg.style.color = "#00B894"; msg.textContent = "✓ Exam saved!";
        setTimeout(() => window.location.href = "exams.html", 800);
      } else {
        msg.style.color = "#ef4444"; msg.textContent = "Something went wrong";
        btn.textContent = "Save Exam";
      }
    }
  </script>
</body>
</html>
