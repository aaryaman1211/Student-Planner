<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Exam Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-dashed { border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 4px; transform: rotate(0.2deg); }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    .chalk-swipe { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.2) 80%, transparent); }
    input { background: transparent; border: 2px dashed rgba(255,255,255,0.3); border-radius: 4px; color: rgba(255,255,255,0.85); padding: 16px; outline: none; transition: all 0.2s; width: 100%; transform: rotate(0.2deg); }
    input:focus { border-style: solid; border-color: rgba(255,255,255,0.6); transform: rotate(0deg); background: rgba(255,255,255,0.05); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .animate-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="text-zinc-50 pb-20">

  <div class="px-6 pt-12 pb-6 border-b-2 border-emerald-400/20 bg-emerald-950/20 animate-up sticky top-0 z-40 backdrop-blur">
    <div class="flex items-center justify-between mb-6">
      <button onclick="window.location.href='exams.html'" class="w-10 h-10 flex items-center justify-center border-2 border-white/20 rounded wobbly-box hover:bg-white/10 transition-all">←</button>
      <button onclick="toggleEdit()" id="editBtn" class="px-4 py-2 text-[11px] font-bold tracking-widest uppercase border-2 border-white/20 rounded wobbly-box hover:bg-white/10 transition-all">✏️ Edit</button>
    </div>
    <h1 id="title" class="text-2xl font-bold chalk-text mb-2 leading-tight">Loading...</h1>
    <p id="subject" class="text-sm chalk-dim font-bold mb-3"></p>
    <div id="date" class="inline-block px-3 py-1 border border-emerald-400/40 bg-emerald-400/10 text-emerald-300 text-[11px] font-bold tracking-widest uppercase wobbly-box"></div>
  </div>

  <div class="max-w-screen-xl mx-auto px-6 mt-6 animate-up" style="animation-delay: 0.1s;">
    
    <div class="wobbly-box p-5 mb-8 -rotate-0.5">
      <div class="flex justify-between items-end mb-3">
        <div id="pct" class="text-4xl font-black chalk-text">0<span class="text-xl text-emerald-400">%</span></div>
        <div id="frac" class="text-[11px] chalk-dim font-bold tracking-widest uppercase">0 / 0 chapters</div>
      </div>
      <div class="h-2 chalk-dashed border-none bg-white/10 rounded overflow-hidden">
        <div id="bar" class="h-full bg-emerald-400/80 transition-all duration-700" style="width:0%"></div>
      </div>
    </div>

    <div id="editFields" class="hidden chalk-dashed p-5 mb-6 rotate-0.5 border-amber-400/40 bg-amber-400/5">
      <div class="mb-4">
        <label class="block text-[11px] font-bold text-amber-200/80 uppercase tracking-widest mb-2">Exam Title</label>
        <input type="text" id="editTitle" />
      </div>
      <div class="mb-4">
        <label class="block text-[11px] font-bold text-amber-200/80 uppercase tracking-widest mb-2">Subject</label>
        <input type="text" id="editSubject" />
      </div>
      <div class="mb-4">
        <label class="block text-[11px] font-bold text-amber-200/80 uppercase tracking-widest mb-2">Exam Date</label>
        <input type="date" id="editDate" />
      </div>
      <button onclick="saveMeta()" class="w-full wobbly-box p-3 font-bold text-amber-950 bg-amber-400 border-amber-500 hover:bg-amber-300 active:scale-95 transition-all">Save Changes</button>
    </div>

    <div id="editInfo" class="hidden text-[11px] chalk-dim font-bold tracking-widest uppercase text-center mb-6">✏️ Edit mode — tap × to remove chapters</div>

    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold chalk-text">📖 Chapters</h2>
      <button id="addChBtn" onclick="showAddRow()" class="hidden wobbly-box px-3 py-1 text-[11px] font-bold tracking-widest uppercase text-emerald-300 border-emerald-400/50 hover:bg-emerald-400/10 transition-all">+ Add chapter</button>
    </div>

    <div id="chapters" class="space-y-3"></div>

    <div id="addRow" class="hidden flex gap-3 mt-4 animate-up">
      <input type="text" id="newChapter" placeholder="Chapter name..." class="flex-1" />
      <button onclick="addChapter()" class="px-5 font-bold text-emerald-950 bg-emerald-400 border-emerald-500 hover:bg-emerald-300 active:scale-95 transition-all wobbly-box">Add</button>
    </div>

  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user")); if (!user) window.location.href = "login.html";
    const id = new URLSearchParams(window.location.search).get("id"), startEdit = new URLSearchParams(window.location.search).get("edit") === "1";
    let editMode = false, exam;

    async function load() {
      const res = await fetch(`https://web-production-dc086.up.railway.app/exams/detail/${id}`);
      exam = await res.json();
      document.getElementById("title").textContent = exam.title; document.getElementById("subject").textContent = exam.subjectName; document.getElementById("date").textContent = "📅 " + exam.examDate;
      document.getElementById("editTitle").value = exam.title; document.getElementById("editSubject").value = exam.subjectName; document.getElementById("editDate").value = exam.examDate;
      updateProgress(); renderChapters(); if (startEdit && !editMode) toggleEdit();
    }

    function renderChapters() {
      const portion = exam.portion || [], div = document.getElementById("chapters"); div.innerHTML = "";
      if (!portion.length) { div.innerHTML = '<div class="chalk-dashed p-6 text-center chalk-dim text-sm mt-4">No chapters added</div>'; return; }
      portion.forEach((ch, i) => {
        const el = document.createElement("div");
        el.className = `wobbly-box p-4 flex items-center gap-4 transition-all hover:bg-white/5 ${!editMode ? 'cursor-pointer' : ''} ${i%2===0 ? 'rotate-0.5' : '-rotate-0.5'}`;
        if (!editMode) el.onclick = () => toggleChapter(i);
        el.innerHTML = `
          <div class="w-7 h-7 border-2 flex items-center justify-center font-bold text-sm flex-shrink-0 transition-colors ${ch.completed ? 'border-emerald-400 text-emerald-400 bg-emerald-400/10' : 'border-white/40 text-transparent bg-black/20'} chalk-dashed">${ch.completed ? '✓' : ''}</div>
          <div class="flex-1 text-base transition-colors ${ch.completed ? 'line-through text-zinc-500' : 'chalk-text font-bold'}">${ch.name}</div>
          <button class="w-8 h-8 flex items-center justify-center border border-red-400/30 text-red-400 rounded hover:bg-red-400/10 transition-colors text-xl font-bold ${editMode ? 'block' : 'hidden'}" onclick="event.stopPropagation(); removeCh(${i})">×</button>`;
        div.appendChild(el);
      });
    }

    function toggleEdit() {
      editMode = !editMode;
      document.getElementById("editBtn").textContent = editMode ? "✓ Done" : "✏️ Edit";
      document.getElementById("editFields").classList.toggle("hidden", !editMode);
      document.getElementById("editInfo").classList.toggle("hidden", !editMode);
      document.getElementById("addChBtn").classList.toggle("hidden", !editMode);
      if (!editMode) document.getElementById("addRow").classList.add("hidden");
      renderChapters();
    }

    async function toggleChapter(index) { await fetch(`https://web-production-dc086.up.railway.app/exams/${id}/chapter/${index}`, { method: "PUT" }); load(); }
    async function removeCh(index) { if (!confirm("Remove this chapter?")) return; exam.portion.splice(index, 1); await saveExam(); renderChapters(); updateProgress(); }
    function showAddRow() { document.getElementById("addRow").classList.remove("hidden"); document.getElementById("newChapter").focus(); }
    async function addChapter() { const input = document.getElementById("newChapter"), name = input.value.trim(); if (!name) return; exam.portion = exam.portion || []; exam.portion.push({ name, completed: false }); await saveExam(); input.value = ""; document.getElementById("addRow").classList.add("hidden"); renderChapters(); updateProgress(); }
    async function saveMeta() { exam.title = document.getElementById("editTitle").value.trim(); exam.subjectName = document.getElementById("editSubject").value.trim(); exam.examDate = document.getElementById("editDate").value; await saveExam(); load(); alert("✓ Saved!"); toggleEdit(); }
    async function saveExam() { await fetch(`https://web-production-dc086.up.railway.app/exams/${id}/update`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(exam) }); }
    function updateProgress() {
      const portion = exam.portion || [], done = portion.filter(c => c.completed).length, total = portion.length, pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById("pct").innerHTML = pct + "<span class='text-xl text-emerald-400'>%</span>";
      document.getElementById("frac").textContent = done + " / " + total + " chapters";
      document.getElementById("bar").style.width = pct + "%";
    }
    load();
  </script>
</body>
</html>
