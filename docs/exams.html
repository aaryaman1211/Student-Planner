<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Exams</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-dashed { border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 4px; transform: rotate(0.2deg); }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .animate-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="text-zinc-50 pb-32">
  <div class="bg-zinc-950 docked full-width top-0 border-b-4 border-zinc-200/20 z-40 sticky animate-up">
    <div class="flex justify-between items-center w-full px-6 py-6 max-w-screen-xl mx-auto">
      <h1 class="text-2xl font-black text-zinc-50 -rotate-1 font-['Space_Grotesk'] tracking-tight">📅 Exams</h1>
      <a href="add-exam.html" class="wobbly-box px-4 py-2 font-bold text-sm bg-white/5 hover:bg-white/10 hover:scale-105 transition-all rotate-1 text-emerald-200 border-emerald-400/50"> + Add </a>
    </div>
  </div>

  <div class="max-w-screen-xl mx-auto px-6 mt-6 animate-up" style="animation-delay: 0.1s;" id="list"></div>

  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-zinc-950 border-t-4 border-zinc-200/20 rounded-t-lg">
    <a href="dashboard.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">calendar_today</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Today</span></a>
    <a href="assignments.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">checklist</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Tasks</span></a>
    <a href="exams.html" class="flex flex-col items-center justify-center bg-zinc-100/10 border-2 border-zinc-50 rounded-md px-3 py-1 -rotate-1 scale-110 transition-transform duration-150 text-zinc-50"><span class="material-symbols-outlined">edit_document</span><span class="font-['Space_Grotesk'] text-[10px] font-bold">Exams</span></a>
    <a href="account.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">person</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Account</span></a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function load() {
      const res  = await fetch(`https://web-production-dc086.up.railway.app/exams/${user.uid}`);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (!data.length) {
        list.innerHTML = '<div class="chalk-dashed p-10 text-center chalk-dim text-sm mt-6">📭 No exams yet<br><span class="text-xs mt-2 block">Tap + Add to start</span></div>';
        return;
      }
      data.sort((a, b) => new Date(a.examDate) - new Date(b.examDate));
      const rots = ['rotate-1', '-rotate-1', 'rotate-0.5', '-rotate-0.5'];
      
      data.forEach((e, i) => {
        const done  = e.portion ? e.portion.filter(c => c.completed).length : 0;
        const total = e.portion ? e.portion.length : 0;
        const pct   = total ? Math.round((done / total) * 100) : 0;
        const daysLeft = Math.ceil((new Date(e.examDate) - new Date()) / 86400000);
        const daysStr  = daysLeft > 0 ? daysLeft + "d left" : daysLeft === 0 ? "Today!" : "Past";
        const r = rots[i % 4];

        list.innerHTML += `
          <div class="wobbly-box p-5 mb-4 transition-all hover:bg-white/5 cursor-pointer ${r}" style="animation: fadeUp .5s cubic-bezier(0.16,1,0.3,1) ${i*0.06}s both" onclick="window.location.href='exam-detail.html?id=${e.id}'">
            <div class="flex justify-between items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="text-lg chalk-text font-bold leading-tight">${e.title}</div>
                <div class="text-sm chalk-dim mt-1">${e.subjectName}</div>
                <div class="text-[10px] font-bold uppercase tracking-widest mt-3 chalk-dim">⏳ ${e.examDate}</div>
              </div>
              <div class="flex flex-col items-end gap-3 flex-shrink-0">
                <span class="wobbly-box px-3 py-1 text-[10px] font-bold uppercase tracking-widest border-emerald-400/50 text-emerald-300 bg-emerald-400/10">${daysStr}</span>
                <div class="flex gap-2" onclick="event.stopPropagation()">
                  <button class="w-8 h-8 flex items-center justify-center border border-white/20 rounded text-sm hover:bg-white/10 transition-colors" onclick="window.location.href='exam-detail.html?id=${e.id}&edit=1'">✏️</button>
                  <button class="w-8 h-8 flex items-center justify-center border border-red-400/30 text-red-400 text-sm rounded hover:bg-red-400/10 transition-colors" onclick="del('${e.id}')">🗑</button>
                </div>
              </div>
            </div>
            ${total > 0 ? `
            <div class="mt-4">
              <div class="w-full h-1 bg-white/10 rounded overflow-hidden chalk-dashed border-none"><div class="h-full bg-emerald-400/70 transition-all duration-700" style="width:${pct}%"></div></div>
              <div class="text-[10px] font-bold chalk-dim uppercase tracking-widest mt-2">${done}/${total} chapters</div>
            </div>` : ''}
          </div>`;
      });
    }
    async function del(id) { if (!confirm("Delete this exam?")) return; await fetch(`https://web-production-dc086.up.railway.app/exams/${id}`, { method: "DELETE" }); load(); }
    load();
  </script>
</body>
</html>
