<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 600; }
    .btn { background: #534AB7; color: white; border: none; padding: 10px 16px;
           border-radius: 10px; font-size: 14px; cursor: pointer; text-decoration: none; }
    .card { background: white; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .card-top { display: flex; justify-content: space-between; align-items: center; }
    .title   { font-size: 16px; font-weight: 500; }
    .subject { font-size: 13px; color: #888; margin-top: 4px; }
    .due     { font-size: 13px; color: #534AB7; margin-top: 4px; }
    .done    { text-decoration: line-through; color: #aaa; }
    .tick-btn { background: #e8f5e9; border: none; padding: 6px 12px;
                border-radius: 8px; font-size: 13px; cursor: pointer; color: #2e7d32; }
    .del-btn  { background: #fdecea; border: none; padding: 6px 10px;
                border-radius: 8px; font-size: 13px; cursor: pointer;
                color: #c62828; margin-left: 6px; }
    .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📝 Assignments</h1>
    <a href="add-assignment.html" class="btn">+ Add</a>
  </div>
  <div id="list"></div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function load() {
      const res  = await fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";

      if (!data.length) {
        list.innerHTML = '<div class="empty">No assignments yet — add one!</div>';
        return;
      }

      data.forEach(a => {
        list.innerHTML += `
          <div class="card">
            <div class="card-top">
              <div>
                <div class="title ${a.completed ? 'done' : ''}">${a.title}</div>
                <div class="subject">${a.subjectName}</div>
                <div class="due">Due: ${a.dueDate}</div>
              </div>
              <div>
                ${!a.completed
                  ? `<button class="tick-btn" onclick="complete('${a.id}')">✅ Done</button>`
                  : `<span style="color:#4caf50;font-size:13px">✅ Done</span>`}
                <button class="del-btn" onclick="del('${a.id}')">🗑</button>
              </div>
            </div>
          </div>`;
      });
    }

    async function complete(id) {
      await fetch(`https://web-production-dc086.up.railway.app/assignments/${id}/complete`, { method: "PUT" });
      load();
    }

    async function del(id) {
      if (!confirm("Delete this assignment?")) return;
      await fetch(`https://web-production-dc086.up.railway.app/assignments/${id}`, { method: "DELETE" });
      load();
    }

    load();
  </script>
</body>
<div style="margin-bottom:16px">
  <a href="dashboard.html" style="font-size:14px;color:#534AB7;text-decoration:none;">← Dashboard</a>
</div>
</html>
