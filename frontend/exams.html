<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exams</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 600; }
    .btn { background: #0F6E56; color: white; border: none; padding: 10px 16px;
           border-radius: 10px; font-size: 14px; cursor: pointer; text-decoration: none; }
    .card { background: white; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); cursor: pointer; }
    .title    { font-size: 16px; font-weight: 500; }
    .subject  { font-size: 13px; color: #888; margin-top: 4px; }
    .date     { font-size: 13px; color: #0F6E56; margin-top: 4px; }
    .progress { font-size: 12px; color: #aaa; margin-top: 6px; }
    .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📅 Exams</h1>
    <a href="add-exam.html" class="btn">+ Add</a>
  </div>
  <div id="list"></div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function load() {
      const res  = await fetch(`http://localhost:8080/exams/${user.uid}`);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";

      if (!data.length) {
        list.innerHTML = '<div class="empty">No exams yet — add one!</div>';
        return;
      }

      data.forEach(e => {
        const done  = e.portion ? e.portion.filter(c => c.completed).length : 0;
        const total = e.portion ? e.portion.length : 0;
        list.innerHTML += `
          <div class="card" onclick="window.location.href='exam-detail.html?id=${e.id}'">
            <div class="title">${e.title}</div>
            <div class="subject">${e.subjectName}</div>
            <div class="date">📅 ${e.examDate}</div>
            <div class="progress">${done}/${total} chapters done</div>
          </div>`;
      });
    }

    load();
  </script>
</body>
<div style="margin-bottom:16px">
  <a href="dashboard.html" style="font-size:14px;color:#0F6E56;text-decoration:none;">← Dashboard</a>
</div>
</html>
