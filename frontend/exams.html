<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>Exams</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:#1C1B29; --card-hover:#222133; --t:#00D4A8; --t2:#55efc4;
            --text:#FFFFFE; --sub:#A7A9BE; --border:rgba(255,255,255,0.08); --p:#7C6FF7; --p2:#a29bfe; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text);
           padding-bottom: max(100px, calc(80px + env(safe-area-inset-bottom))); }
           
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .a1 { animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .a2 { animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) .1s both; }

    .header { background: radial-gradient(circle at top left, #004d3a, #001f18);
              padding: max(56px, calc(36px + env(safe-area-inset-top))) 24px 24px; border-bottom: 1px solid var(--border);
              position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .add-btn { background: linear-gradient(135deg, var(--t), var(--t2)); color: #001a14;
               border: none; padding: 12px 24px; border-radius: 24px; font-size: 15px;
               font-weight: 800; cursor: pointer; text-decoration: none; display: inline-block;
               box-shadow: 0 8px 20px rgba(0,212,168,0.3); transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .add-btn:active { transform: scale(0.92); }

    .content { padding: 20px 18px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 22px; margin-bottom: 14px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .card:hover { transform: translateY(-3px); background: var(--card-hover); border-color: rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; cursor: pointer; }
    .title   { font-size: 18px; font-weight: 800; letter-spacing: -0.2px; margin-bottom: 4px; }
    .subject { font-size: 14px; color: var(--sub); font-weight: 500; }
    .date    { font-size: 13px; color: var(--t); margin-top: 8px; font-weight: 700; display: inline-block; background: rgba(0,212,168,0.1); padding: 4px 10px; border-radius: 12px; }
    
    .right-col { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; flex-shrink: 0; }
    .days-badge { font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: 20px;
                  background: rgba(0,212,168,0.15); color: var(--t); white-space: nowrap; border: 1px solid rgba(0,212,168,0.3); }
    .card-actions { display: flex; gap: 8px; }
    .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 36px; height: 36px;
                border-radius: 12px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
                transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .icon-btn.edit { color: var(--p2); }
    .icon-btn.del  { color: #FF6B6B; background: rgba(255,107,107,0.05); border-color: rgba(255,107,107,0.2); }
    .icon-btn:active { transform: scale(0.9); }
    
    .prog-wrap { margin-top: 18px; }
    .prog-bar  { background: rgba(255,255,255,0.05); border-radius: 8px; height: 8px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
    .prog-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--t), var(--t2));
                 box-shadow: 0 0 10px rgba(0,212,168,0.4); transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .prog-text { font-size: 13px; color: var(--sub); margin-top: 8px; font-weight: 600; }
    
    .empty { text-align: center; color: var(--sub); padding: 60px 0; font-size: 15px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.8; }

    /* Glass Bottom Nav */
    .bnav { position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(20,19,34,0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 0 max(20px, env(safe-area-inset-bottom));
            display: flex; z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.3); }
    .bnav a { flex: 1; display: flex; flex-direction: column; align-items: center; text-decoration: none; gap: 5px; transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .bnav a:active { transform: scale(0.85); }
    .bnav-icon  { font-size: 22px; filter: grayscale(100%) opacity(0.6); transition: all 0.3s ease; }
    .bnav-label { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s ease; }
    .bnav a.active .bnav-icon { filter: grayscale(0%) opacity(1); transform: translateY(-2px); }
    .bnav a.active .bnav-label { color: var(--p2); }
  </style>
</head>
<body>
  <div class="header a1">
    <div class="header-row">
      <h1>📅 Exams</h1>
      <a href="add-exam.html" class="add-btn">+ Add</a>
    </div>
  </div>

  <div class="content a2" id="list"></div>

  <nav class="bnav">
    <a href="dashboard.html"><span class="bnav-icon">🏠</span><span class="bnav-label">Home</span></a>
    <a href="assignments.html"><span class="bnav-icon">📝</span><span class="bnav-label">Tasks</span></a>
    <a href="exams.html" class="active"><span class="bnav-icon">📅</span><span class="bnav-label">Exams</span></a>
    <a href="account.html"><span class="bnav-icon">👤</span><span class="bnav-label">Account</span></a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function load() {
      const res  = await fetch(`https://web-production-dc086.up.railway.app/exams/${user.uid}`);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (!data.length) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No exams yet<br><small style="font-size:14px;margin-top:8px;display:block">Tap + Add to get started</small></div>';
        return;
      }
      data.sort((a, b) => new Date(a.examDate) - new Date(b.examDate));
      data.forEach((e, i) => {
        const done  = e.portion ? e.portion.filter(c => c.completed).length : 0;
        const total = e.portion ? e.portion.length : 0;
        const pct   = total ? Math.round((done / total) * 100) : 0;
        const daysLeft = Math.ceil((new Date(e.examDate) - new Date()) / 86400000);
        const daysStr  = daysLeft > 0 ? daysLeft + "d left" : daysLeft === 0 ? "Today!" : "Past";
        list.innerHTML += `
          <div class="card" style="animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) ${i*0.06}s both">
            <div class="card-top" onclick="window.location.href='exam-detail.html?id=${e.id}'">
              <div style="flex:1">
                <div class="title">${e.title}</div>
                <div class="subject">${e.subjectName}</div>
                <div class="date">⏳ ${e.examDate}</div>
              </div>
              <div class="right-col">
                <span class="days-badge">${daysStr}</span>
                <div class="card-actions" onclick="event.stopPropagation()">
                  <button class="icon-btn edit" onclick="window.location.href='exam-detail.html?id=${e.id}&edit=1'">✏️</button>
                  <button class="icon-btn del"  onclick="del('${e.id}')">🗑</button>
                </div>
              </div>
            </div>
            ${total > 0 ? `
            <div class="prog-wrap">
              <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
              <div class="prog-text">${done}/${total} chapters done</div>
            </div>` : ''}
          </div>`;
      });
    }

    async function del(id) {
      if (!confirm("Delete this exam?")) return;
      await fetch(`https://web-production-dc086.up.railway.app/exams/${id}`, { method: "DELETE" });
      load();
    }
    load();
  </script>
</body>
</html>
