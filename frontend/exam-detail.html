<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>Exam Detail</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:#1C1B29; --card2:#26253A; --t:#00D4A8; --t2:#55efc4;
            --text:#FFFFFE; --sub:#A7A9BE; --border:#2D2C44; --p:#7C6FF7; --p2:#a29bfe; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
           min-height: 100vh; padding-bottom: 40px; }
    @keyframes up   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fill { from { width: 0%; } to { width: var(--w); } }
    .a1 { animation: up .4s ease both; }
    .a2 { animation: up .4s .1s ease both; }
    .a3 { animation: up .4s .2s ease both; }

    .header { background: linear-gradient(135deg, #001f18, #003d2e);
              padding: max(52px, calc(34px + env(safe-area-inset-top))) 20px 28px; }
    .back-row { display: flex; align-items: center; justify-content: space-between;
                margin-bottom: 16px; }
    .back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: white; width: 40px; height: 40px; border-radius: 13px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .edit-toggle { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
                   color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px;
                   font-weight: 600; cursor: pointer; }
    .exam-title { font-size: 22px; font-weight: 800; color: white; }
    .exam-sub   { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 4px; }
    .exam-date  { font-size: 13px; color: var(--t); margin-top: 6px; font-weight: 600; }

    .progress-section { background: var(--card); padding: 20px;
                        border-bottom: 1px solid var(--border); }
    .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .prog-pct  { font-size: 32px; font-weight: 800; color: var(--t); }
    .prog-frac { font-size: 14px; color: var(--sub); }
    .prog-bar  { background: var(--card2); border-radius: 8px; height: 10px; overflow: hidden; }
    .prog-fill { height: 10px; border-radius: 8px;
                 background: linear-gradient(90deg, var(--t), var(--t2));
                 animation: fill 0.8s ease both; }

    .chapters-section { padding: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center;
                      margin-bottom: 14px; }
    .section-title { font-size: 17px; font-weight: 700; }
    .add-ch-btn { background: rgba(0,212,168,0.12); border: none; color: var(--t);
                  padding: 7px 14px; border-radius: 20px; font-size: 13px;
                  font-weight: 600; cursor: pointer; display: none; }
    .add-ch-btn.visible { display: block; }

    .chapter { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
               padding: 15px 16px; margin-bottom: 8px;
               display: flex; align-items: center; gap: 14px;
               transition: background 0.15s; }
    .chapter.clickable { cursor: pointer; }
    .chapter.clickable:active { background: var(--card2); }
    .check { width: 26px; height: 26px; border-radius: 8px; border: 2px solid var(--border);
             display: flex; align-items: center; justify-content: center;
             flex-shrink: 0; transition: all 0.2s; font-size: 13px; font-weight: 700; }
    .check.done { background: var(--t); border-color: var(--t); color: #001a14; }
    .ch-name { font-size: 15px; color: var(--text); flex: 1; }
    .ch-name.done { text-decoration: line-through; color: var(--sub); }
    .ch-del-btn { background: rgba(255,107,107,0.15); border: none; color: #FF6B6B;
                  width: 32px; height: 32px; border-radius: 10px; font-size: 16px;
                  cursor: pointer; flex-shrink: 0; display: none; transition: transform 0.15s; }
    .ch-del-btn.visible { display: flex; align-items: center; justify-content: center; }
    .ch-del-btn:active { transform: scale(0.9); }

    .add-ch-row { display: flex; gap: 8px; margin-top: 8px; display: none; }
    .add-ch-row.visible { display: flex; }
    .add-ch-row input { flex: 1; padding: 13px 14px; border: 1.5px solid var(--border);
                        border-radius: 12px; font-size: 15px; outline: none;
                        background: var(--card); color: var(--text); }
    .add-ch-row input:focus { border-color: var(--t); }
    .add-ch-row input::placeholder { color: var(--sub); }
    .confirm-btn { background: var(--t); border: none; color: #001a14; padding: 13px 16px;
                   border-radius: 12px; font-size: 14px; font-weight: 700;
                   cursor: pointer; flex-shrink: 0; }

    .edit-info { background: rgba(0,212,168,0.08); border: 1px solid rgba(0,212,168,0.2);
                 border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
                 font-size: 13px; color: var(--t); display: none; }
    .edit-info.visible { display: block; }

    .empty { text-align: center; color: var(--sub); padding: 30px 0; font-size: 14px; }

    /* Edit mode fields */
    .edit-fields { background: var(--card); border: 1px solid var(--border); border-radius: 16px;
                   padding: 18px; margin-bottom: 16px; display: none; }
    .edit-fields.visible { display: block; }
    .edit-fields label { font-size: 11px; font-weight: 700; color: var(--t); text-transform: uppercase;
                         letter-spacing: 0.07em; display: block; margin-bottom: 7px; margin-top: 14px; }
    .edit-fields label:first-child { margin-top: 0; }
    .edit-fields input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border);
                         border-radius: 12px; font-size: 15px; outline: none;
                         background: var(--card2); color: var(--text); }
    .edit-fields input:focus { border-color: var(--t); }
    .save-meta-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--t), var(--t2));
                     color: #001a14; border: none; border-radius: 12px; font-size: 15px;
                     font-weight: 700; cursor: pointer; margin-top: 14px; transition: transform 0.15s; }
    .save-meta-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="header a1">
    <div class="back-row">
      <button class="back" onclick="window.location.href='exams.html'">←</button>
      <button class="edit-toggle" onclick="toggleEdit()" id="editBtn">✏️ Edit</button>
    </div>
    <div class="exam-title" id="title">Loading...</div>
    <div class="exam-sub"  id="subject"></div>
    <div class="exam-date" id="date"></div>
  </div>

  <div class="progress-section a2">
    <div class="prog-row">
      <div class="prog-pct" id="pct">0%</div>
      <div class="prog-frac" id="frac">0 / 0 chapters</div>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="bar" style="--w:0%; width:0%"></div>
    </div>
  </div>

  <div class="chapters-section a3">
    <!-- Edit fields for title/subject/date -->
    <div class="edit-fields" id="editFields">
      <label>Exam Title</label>
      <input type="text" id="editTitle" />
      <label>Subject</label>
      <input type="text" id="editSubject" />
      <label>Exam Date</label>
      <input type="date" id="editDate" />
      <button class="save-meta-btn" onclick="saveMeta()">Save Changes</button>
    </div>

    <div class="edit-info" id="editInfo">✏️ Edit mode — tap × to remove chapters or add new ones below</div>

    <div class="section-header">
      <div class="section-title">📖 Chapters</div>
      <button class="add-ch-btn" id="addChBtn" onclick="showAddRow()">+ Add chapter</button>
    </div>

    <div id="chapters"></div>

    <div class="add-ch-row" id="addRow">
      <input type="text" id="newChapter" placeholder="Chapter name..." />
      <button class="confirm-btn" onclick="addChapter()">Add</button>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    const id       = new URLSearchParams(window.location.search).get("id");
    const startEdit = new URLSearchParams(window.location.search).get("edit") === "1";
    let editMode = false;
    let exam;

    async function load() {
      const res = await fetch(`https://web-production-dc086.up.railway.app/exams/detail/${id}`);
      exam = await res.json();

      document.getElementById("title").textContent   = exam.title;
      document.getElementById("subject").textContent = exam.subjectName;
      document.getElementById("date").textContent    = "📅 " + exam.examDate;
      document.getElementById("editTitle").value     = exam.title;
      document.getElementById("editSubject").value   = exam.subjectName;
      document.getElementById("editDate").value      = exam.examDate;

      const portion = exam.portion || [];
      const done    = portion.filter(c => c.completed).length;
      const total   = portion.length;
      const pct     = total ? Math.round((done / total) * 100) : 0;

      document.getElementById("pct").textContent  = pct + "%";
      document.getElementById("frac").textContent = done + " / " + total + " chapters";
      const bar = document.getElementById("bar");
      bar.style.setProperty("--w", pct + "%");
      setTimeout(() => bar.style.width = pct + "%", 100);

      renderChapters();
      if (startEdit && !editMode) toggleEdit();
    }

    function renderChapters() {
      const portion = exam.portion || [];
      const div = document.getElementById("chapters");
      div.innerHTML = "";
      if (!portion.length) {
        div.innerHTML = '<div class="empty">No chapters added</div>'; return;
      }
      portion.forEach((ch, i) => {
        const el = document.createElement("div");
        el.className = "chapter" + (editMode ? "" : " clickable");
        el.style.animation = `up .3s ${i*0.04}s ease both`;
        el.innerHTML = `
          <div class="check ${ch.completed ? 'done' : ''}">${ch.completed ? '✓' : ''}</div>
          <div class="ch-name ${ch.completed ? 'done' : ''}">${ch.name}</div>
          <button class="ch-del-btn ${editMode ? 'visible' : ''}" onclick="removeCh(${i})">×</button>`;
        if (!editMode) el.onclick = () => toggleChapter(i);
        div.appendChild(el);
      });
    }

    function toggleEdit() {
      editMode = !editMode;
      document.getElementById("editBtn").textContent    = editMode ? "✓ Done" : "✏️ Edit";
      document.getElementById("editFields").classList.toggle("visible", editMode);
      document.getElementById("editInfo").classList.toggle("visible", editMode);
      document.getElementById("addChBtn").classList.toggle("visible", editMode);
      if (!editMode) document.getElementById("addRow").classList.remove("visible");
      renderChapters();
    }

    async function toggleChapter(index) {
      await fetch(`https://web-production-dc086.up.railway.app/exams/${id}/chapter/${index}`, { method: "PUT" });
      load();
    }

    async function removeCh(index) {
      if (!confirm("Remove this chapter?")) return;
      exam.portion.splice(index, 1);
      await saveExam();
      renderChapters();
      updateProgress();
    }

    function showAddRow() {
      document.getElementById("addRow").classList.add("visible");
      document.getElementById("newChapter").focus();
    }

    async function addChapter() {
      const input = document.getElementById("newChapter");
      const name  = input.value.trim();
      if (!name) return;
      exam.portion = exam.portion || [];
      exam.portion.push({ name, completed: false });
      await saveExam();
      input.value = "";
      document.getElementById("addRow").classList.remove("visible");
      renderChapters();
      updateProgress();
    }

    async function saveMeta() {
      exam.title       = document.getElementById("editTitle").value.trim();
      exam.subjectName = document.getElementById("editSubject").value.trim();
      exam.examDate    = document.getElementById("editDate").value;
      await saveExam();
      document.getElementById("title").textContent   = exam.title;
      document.getElementById("subject").textContent = exam.subjectName;
      document.getElementById("date").textContent    = "📅 " + exam.examDate;
      alert("✓ Saved!");
    }

    async function saveExam() {
      await fetch(`https://web-production-dc086.up.railway.app/exams/${id}/update`, {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(exam)
      });
    }

    function updateProgress() {
      const portion = exam.portion || [];
      const done  = portion.filter(c => c.completed).length;
      const total = portion.length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById("pct").textContent  = pct + "%";
      document.getElementById("frac").textContent = done + " / " + total + " chapters";
      document.getElementById("bar").style.width  = pct + "%";
    }

    load();
  </script>
</body>
</html>
