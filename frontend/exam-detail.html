<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>Exam Detail</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:#1C1B29; --card-hover:#222133; --card2:#26253A; --t:#00D4A8; --t2:#55efc4;
            --text:#FFFFFE; --sub:#A7A9BE; --border:rgba(255,255,255,0.08); --p:#7C6FF7; --p2:#a29bfe; }
            
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text);
           min-height: 100vh; padding-bottom: 60px; }
           
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fill { from { width: 0%; } to { width: var(--w); } }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .a1 { animation: fadeUp .5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .a2 { animation: fadeUp .5s cubic-bezier(0.16, 1, 0.3, 1) .1s both; }
    .a3 { animation: fadeUp .5s cubic-bezier(0.16, 1, 0.3, 1) .2s both; }

    /* Premium Header */
    .header { background: radial-gradient(circle at bottom right, #004d3a, #001f18);
              padding: max(52px, calc(34px + env(safe-area-inset-top))) 24px 32px; border-bottom: 1px solid rgba(0,212,168,0.2); }
    .back-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .back, .edit-toggle { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
                          color: white; border-radius: 16px; font-size: 15px; font-weight: 600; cursor: pointer; 
                          transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; justify-content: center; }
    .back { width: 44px; height: 44px; }
    .edit-toggle { padding: 0 18px; height: 44px; }
    .back:hover, .edit-toggle:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .back:active, .edit-toggle:active { transform: scale(0.95); }
    
    .exam-title { font-size: 26px; font-weight: 800; color: white; letter-spacing: -0.5px; line-height: 1.2; }
    .exam-sub   { font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 8px; font-weight: 500; }
    .exam-date  { display: inline-block; background: rgba(0,212,168,0.15); padding: 6px 12px; border-radius: 20px; font-size: 13px; color: var(--t); margin-top: 12px; font-weight: 700; border: 1px solid rgba(0,212,168,0.2); }

    /* Progress UI */
    .progress-section { background: var(--card); padding: 24px; border-bottom: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .prog-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
    .prog-pct  { font-size: 38px; font-weight: 800; color: var(--text); line-height: 1; }
    .prog-pct span { color: var(--t); font-size: 24px; margin-left: 2px;}
    .prog-frac { font-size: 14px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
    .prog-bar  { background: rgba(255,255,255,0.05); border-radius: 10px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
    .prog-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--t), var(--t2));
                 box-shadow: 0 0 10px rgba(0,212,168,0.4); animation: fill 1s cubic-bezier(0.16, 1, 0.3, 1) both; }

    .chapters-section { padding: 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .section-title { font-size: 18px; font-weight: 700; }
    .add-ch-btn { background: rgba(0,212,168,0.1); border: 1px solid rgba(0,212,168,0.2); color: var(--t);
                  padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; display: none; transition: all 0.2s; }
    .add-ch-btn:active { transform: scale(0.95); }
    .add-ch-btn.visible { display: block; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

    /* Interactive Chapters */
    .chapter { background: var(--card); border: 1px solid var(--border); border-radius: 16px;
               padding: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 16px;
               transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .chapter.clickable { cursor: pointer; }
    .chapter.clickable:hover { background: var(--card-hover); transform: translateX(4px); border-color: rgba(255,255,255,0.15); }
    .chapter.clickable:active { transform: scale(0.98); }
    
    .check { width: 28px; height: 28px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2);
             display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2);
             flex-shrink: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); font-size: 14px; font-weight: 800; color: transparent; }
    .check.done { background: var(--t); border-color: var(--t); color: #001a14; box-shadow: 0 4px 10px rgba(0,212,168,0.3); }
    .ch-name { font-size: 16px; font-weight: 500; color: var(--text); flex: 1; transition: color 0.3s; }
    .ch-name.done { text-decoration: line-through; color: var(--sub); }
    
    .ch-del-btn { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); color: #FF6B6B;
                  width: 36px; height: 36px; border-radius: 12px; font-size: 18px;
                  cursor: pointer; flex-shrink: 0; display: none; transition: transform 0.15s; }
    .ch-del-btn.visible { display: flex; align-items: center; justify-content: center; animation: popIn 0.3s; }
    .ch-del-btn:active { transform: scale(0.9); background: rgba(255,107,107,0.2); }

    .add-ch-row { display: flex; gap: 10px; margin-top: 12px; display: none; }
    .add-ch-row.visible { display: flex; animation: fadeUp 0.3s; }
    .add-ch-row input { flex: 1; padding: 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 16px; outline: none; background: var(--card); color: var(--text); transition: border-color 0.2s; }
    .add-ch-row input:focus { border-color: var(--t); }
    .confirm-btn { background: linear-gradient(135deg, var(--t), var(--t2)); border: none; color: #001a14; padding: 0 24px;
                   border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,212,168,0.3); transition: transform 0.2s; }
    .confirm-btn:active { transform: scale(0.95); }

    .edit-info { background: rgba(0,212,168,0.05); border: 1px dashed rgba(0,212,168,0.3); border-radius: 14px; padding: 14px 18px; margin-bottom: 20px; font-size: 14px; color: var(--t); display: none; }
    .edit-info.visible { display: block; animation: fadeUp 0.3s; }
    .empty { text-align: center; color: var(--sub); padding: 40px 0; font-size: 15px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px dashed var(--border); }

    /* Form Fields Styling for Edit */
    .edit-fields { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 20px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .edit-fields.visible { display: block; animation: fadeUp 0.3s; }
    .edit-fields label { font-size: 12px; font-weight: 700; color: var(--t); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; margin-top: 18px; }
    .edit-fields label:first-child { margin-top: 0; }
    .edit-fields input { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 16px; outline: none; background: rgba(0,0,0,0.2); color: var(--text); transition: border-color 0.2s; }
    .edit-fields input:focus { border-color: var(--t); }
    .save-meta-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--t), var(--t2)); color: #001a14; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: transform 0.15s; box-shadow: 0 8px 20px rgba(0,212,168,0.3); }
    .save-meta-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="header a1">
    <div class="back-row">
      <button class="back" onclick="window.location.href='exams.html'">←</button>
      <button class="edit-toggle" onclick="toggleEdit()" id="editBtn">✏️ Edit</button>
    </div>
    <div class="exam-title" id="title">Loading...</div>
    <div class="exam-sub"  id="subject"></div>
    <div class="exam-date" id="date"></div>
  </div>

  <div class="progress-section a2">
    <div class="prog-row">
      <div class="prog-pct" id="pct">0<span>%</span></div>
      <div class="prog-frac" id="frac">0 / 0 chapters</div>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="bar" style="--w:0%; width:0%"></div>
    </div>
  </div>

  <div class="chapters-section a3">
    <div class="edit-fields" id="editFields">
      <label>Exam Title</label>
      <input type="text" id="editTitle" />
      <label>Subject</label>
      <input type="text" id="editSubject" />
      <label>Exam Date</label>
      <input type="date" id="editDate" />
      <button class="save-meta-btn" onclick="saveMeta()">Save Changes</button>
    </div>

    <div class="edit-info" id="editInfo">✏️ Edit mode — tap × to remove chapters or add new ones below</div>

    <div class="section-header">
      <div class="section-title">📖 Chapters</div>
      <button class="add-ch-btn" id="addChBtn" onclick="showAddRow()">+ Add chapter</button>
    </div>

    <div id="chapters"></div>

    <div class="add-ch-row" id="addRow">
      <input type="text" id="newChapter" placeholder="Chapter name..." />
      <button class="confirm-btn" onclick="addChapter()">Add</button>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    const id       = new URLSearchParams(window.location.search).get("id");
    const startEdit = new URLSearchParams(window.location.search).get("edit") === "1";
    let editMode = false;
    let exam;

    async function load() {
      const res = await fetch(`https://web-production-dc086.up.railway.app/exams/detail/${id}`);
      exam = await res.json();

      document.getElementById("title").textContent   = exam.title;
      document.getElementById("subject").textContent = exam.subjectName;
      document.getElementById("date").textContent    = "📅 " + exam.examDate;
      document.getElementById("editTitle").value     = exam.title;
      document.getElementById("editSubject").value   = exam.subjectName;
      document.getElementById("editDate").value      = exam.examDate;

      const portion = exam.portion || [];
      const done    = portion.filter(c => c.completed).length;
      const total   = portion.length;
      const pct     = total ? Math.round((done / total) * 100) : 0;

      document.getElementById("pct").innerHTML  = pct + "<span>%</span>";
      document.getElementById("frac").textContent = done + " / " + total + " chapters";
      const bar = document.getElementById("bar");
      bar.style.setProperty("--w", pct + "%");
      setTimeout(() => bar.style.width = pct + "%", 100);

      renderChapters();
      if (startEdit && !editMode) toggleEdit();
    }

    function renderChapters() {
      const portion = exam.portion || [];
      const div = document.getElementById("chapters");
      div.innerHTML = "";
      if (!portion.length) {
        div.innerHTML = '<div class="empty">No chapters added</div>'; return;
      }
      portion.forEach((ch, i) => {
        const el = document.createElement("div");
        el.className = "chapter" + (editMode ? "" : " clickable");
        el.style.animation = `fadeUp .4s cubic-bezier(0.16, 1, 0.3, 1) ${i*0.06}s both`;
        el.innerHTML = `
          <div class="check ${ch.completed ? 'done' : ''}">${ch.completed ? '✓' : ''}</div>
          <div class="ch-name ${ch.completed ? 'done' : ''}">${ch.name}</div>
          <button class="ch-del-btn ${editMode ? 'visible' : ''}" onclick="removeCh(${i})">×</button>`;
        if (!editMode) el.onclick = () => toggleChapter(i);
        div.appendChild(el);
      });
    }

    function toggleEdit() {
      editMode = !editMode;
      document.getElementById("editBtn").textContent    = editMode ? "✓ Done" : "✏️ Edit";
      document.getElementById("editFields").classList.toggle("visible", editMode);
      document.getElementById("editInfo").classList.toggle("visible", editMode);
      document.getElementById("addChBtn").classList.toggle("visible", editMode);
      if (!editMode) document.getElementById("addRow").classList.remove("visible");
      renderChapters();
    }

    async function toggleChapter(index) {
      await fetch(`https://web-production-dc086.up.railway.app/exams/${id}/chapter/${index}`, { method: "PUT" });
      load();
    }

    async function removeCh(index) {
      if (!confirm("Remove this chapter?")) return;
      exam.portion.splice(index, 1);
      await saveExam();
      renderChapters();
      updateProgress();
    }

    function showAddRow() {
      document.getElementById("addRow").classList.add("visible");
      document.getElementById("newChapter").focus();
    }

    async function addChapter() {
      const input = document.getElementById("newChapter");
      const name  = input.value.trim();
      if (!name) return;
      exam.portion = exam.portion || [];
      exam.portion.push({ name, completed: false });
      await saveExam();
      input.value = "";
      document.getElementById("addRow").classList.remove("visible");
      renderChapters();
      updateProgress();
    }

    async function saveMeta() {
      exam.title       = document.getElementById("editTitle").value.trim();
      exam.subjectName = document.getElementById("editSubject").value.trim();
      exam.examDate    = document.getElementById("editDate").value;
      await saveExam();
      document.getElementById("title").textContent   = exam.title;
      document.getElementById("subject").textContent = exam.subjectName;
      document.getElementById("date").textContent    = "📅 " + exam.examDate;
      alert("✓ Saved!");
    }

    async function saveExam() {
      await fetch(`https://web-production-dc086.up.railway.app/exams/${id}/update`, {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(exam)
      });
    }

    function updateProgress() {
      const portion = exam.portion || [];
      const done  = portion.filter(c => c.completed).length;
      const total = portion.length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById("pct").innerHTML  = pct + "<span>%</span>";
      document.getElementById("frac").textContent = done + " / " + total + " chapters";
      document.getElementById("bar").style.width  = pct + "%";
    }

    load();
  </script>
</body>
</html>
