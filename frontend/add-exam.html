<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>Add Exam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:#1C1B29; --t:#00D4A8; --t2:#55efc4; --text:#FFFFFE; --sub:#A7A9BE; --border:#2D2C44; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
           padding-bottom: 40px; }
    @keyframes up { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .header { background: linear-gradient(135deg, #001f18, #003d2e);
              padding: max(52px, calc(34px + env(safe-area-inset-top))) 20px 24px;
              display: flex; align-items: center; gap: 14px; }
    .back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: white; width: 40px; height: 40px; border-radius: 13px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 700; color: white; }
    .form { padding: 24px 20px; animation: up 0.4s ease both; }
    .field { margin-bottom: 22px; }
    label { font-size: 11px; font-weight: 700; color: var(--t); text-transform: uppercase;
            letter-spacing: 0.08em; display: block; margin-bottom: 9px; }
    input { width: 100%; padding: 15px 16px; border: 1.5px solid var(--border);
            border-radius: 14px; font-size: 16px; outline: none;
            background: var(--card); color: var(--text); transition: all 0.2s; }
    input::placeholder { color: var(--sub); }
    input:focus { border-color: var(--t); }
    .ch-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .ch-row  { display: flex; gap: 8px; }
    .ch-row input { margin-bottom: 0; flex: 1; }
    .ch-del { background: rgba(255,107,107,0.15); border: none; color: #FF6B6B;
              width: 46px; border-radius: 12px; font-size: 18px; cursor: pointer;
              flex-shrink: 0; transition: transform 0.15s; }
    .ch-del:active { transform: scale(0.9); }
    .add-ch { width: 100%; padding: 13px; background: rgba(0,212,168,0.1);
              border: 1.5px dashed rgba(0,212,168,0.3); color: var(--t); border-radius: 14px;
              font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 24px;
              transition: all 0.2s; }
    .add-ch:active { background: rgba(0,212,168,0.2); }
    .save-btn { width: 100%; padding: 16px;
                background: linear-gradient(135deg, var(--t), var(--t2));
                color: #001a14; border: none; border-radius: 14px; font-size: 16px;
                font-weight: 700; cursor: pointer; box-shadow: 0 8px 30px rgba(0,212,168,0.3);
                transition: transform 0.15s; }
    .save-btn:active { transform: scale(0.97); }
    #msg { text-align: center; font-size: 14px; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back" onclick="history.back()">←</button>
    <h1>New Exam</h1>
  </div>
  <div class="form">
    <div class="field"><label>Exam Title</label><input type="text" id="title" placeholder="e.g. Physics Unit Test" /></div>
    <div class="field"><label>Subject</label><input type="text" id="subject" placeholder="e.g. Physics" /></div>
    <div class="field"><label>Exam Date</label><input type="date" id="examDate" /></div>
    <div class="field">
      <label>Chapters / Portion</label>
      <div class="ch-list" id="chapters">
        <div class="ch-row">
          <input type="text" placeholder="e.g. Chapter 1 - Motion" class="ch-input" />
          <button class="ch-del" onclick="removeCh(this)">×</button>
        </div>
      </div>
      <button class="add-ch" onclick="addChapter()">+ Add chapter</button>
    </div>
    <button class="save-btn" onclick="save()" id="btn">Save Exam</button>
    <div id="msg"></div>
  </div>
  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";
    function addChapter() {
      const div = document.createElement("div");
      div.className = "ch-row";
      div.innerHTML = `<input type="text" placeholder="Add chapter name" class="ch-input" /><button class="ch-del" onclick="removeCh(this)">×</button>`;
      document.getElementById("chapters").appendChild(div);
    }
    function removeCh(btn) {
      const rows = document.querySelectorAll(".ch-row");
      if (rows.length > 1) btn.parentElement.remove();
    }
    async function save() {
      const title    = document.getElementById("title").value.trim();
      const subject  = document.getElementById("subject").value.trim();
      const examDate = document.getElementById("examDate").value;
      const msg = document.getElementById("msg");
      const btn = document.getElementById("btn");
      const portion = Array.from(document.querySelectorAll(".ch-input"))
        .map(i => i.value.trim()).filter(v => v).map(name => ({ name, completed: false }));
      if (!title || !subject || !examDate) { msg.style.color="#FF6B6B"; msg.textContent="Please fill title, subject and date"; return; }
      btn.textContent = "Saving...";
      const res = await fetch("https://web-production-dc086.up.railway.app/exams", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, subjectName: subject, examDate, userId: user.uid, portion })
      });
      if (res.ok) { msg.style.color="#00D4A8"; msg.textContent="✓ Exam saved!"; setTimeout(() => window.location.href="exams.html", 800); }
      else { msg.style.color="#FF6B6B"; msg.textContent="Something went wrong"; btn.textContent="Save Exam"; }
    }
  </script>
</body>
</html>
