<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>Add Assignment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:#1C1B29; --p:#7C6FF7; --p2:#a29bfe; --text:#FFFFFE; --sub:#A7A9BE; --border:#2D2C44; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    @keyframes up { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .header { background: linear-gradient(135deg, #1a1040, #241b5e);
              padding: max(52px, calc(34px + env(safe-area-inset-top))) 20px 24px;
              display: flex; align-items: center; gap: 14px; }
    .back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: white; width: 40px; height: 40px; border-radius: 13px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 700; color: white; }
    .form { padding: 24px 20px; animation: up 0.4s ease both; }
    .field { margin-bottom: 22px; }
    label { font-size: 11px; font-weight: 700; color: var(--p2); text-transform: uppercase;
            letter-spacing: 0.08em; display: block; margin-bottom: 9px; }
    input { width: 100%; padding: 15px 16px; border: 1.5px solid var(--border);
            border-radius: 14px; font-size: 16px; outline: none;
            background: var(--card); color: var(--text); transition: all 0.2s; }
    input::placeholder { color: var(--sub); }
    input:focus { border-color: var(--p); }
    .save-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--p), var(--p2));
                color: white; border: none; border-radius: 14px; font-size: 16px;
                font-weight: 700; cursor: pointer; box-shadow: 0 8px 30px rgba(124,111,247,0.35);
                transition: transform 0.15s; margin-top: 8px; }
    .save-btn:active { transform: scale(0.97); }
    #msg { text-align: center; font-size: 14px; margin-top: 14px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back" onclick="history.back()">←</button>
    <h1>New Assignment</h1>
  </div>
  <div class="form">
    <div class="field"><label>Title</label><input type="text" id="title" placeholder="e.g. Maths HW Chapter 5" /></div>
    <div class="field"><label>Subject</label><input type="text" id="subject" placeholder="e.g. Mathematics" /></div>
    <div class="field"><label>Due Date</label><input type="date" id="dueDate" /></div>
    <button class="save-btn" onclick="save()" id="btn">Save Assignment</button>
    <div id="msg"></div>
  </div>
  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";
    async function save() {
      const title   = document.getElementById("title").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const dueDate = document.getElementById("dueDate").value;
      const msg = document.getElementById("msg");
      const btn = document.getElementById("btn");
      if (!title || !subject || !dueDate) { msg.style.color="#FF6B6B"; msg.textContent="Please fill all fields"; return; }
      btn.textContent = "Saving...";
      const res = await fetch("https://web-production-dc086.up.railway.app/assignments", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, subjectName: subject, dueDate, userId: user.uid })
      });
      if (res.ok) { msg.style.color="#00D4A8"; msg.textContent="✓ Saved!"; setTimeout(() => window.location.href="assignments.html", 800); }
      else { msg.style.color="#FF6B6B"; msg.textContent="Something went wrong"; btn.textContent="Save Assignment"; }
    }
  </script>
</body>
</html>
