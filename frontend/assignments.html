<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Assignments</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-dashed { border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 4px; transform: rotate(0.2deg); }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .animate-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="text-zinc-50 pb-32">
  <div class="bg-zinc-950 docked full-width top-0 border-b-4 border-zinc-200/20 z-40 sticky animate-up">
    <div class="flex justify-between items-center w-full px-6 py-6 max-w-screen-xl mx-auto">
      <h1 class="text-2xl font-black text-zinc-50 -rotate-1 font-['Space_Grotesk'] tracking-tight">📝 Tasks</h1>
      <a href="add-assignment.html" class="wobbly-box px-4 py-2 font-bold text-sm bg-white/5 hover:bg-white/10 hover:scale-105 transition-all rotate-1"> + Add </a>
    </div>
  </div>

  <div class="max-w-screen-xl mx-auto px-6 mt-6 animate-up" style="animation-delay: 0.1s;" id="list"></div>

  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-zinc-950 border-t-4 border-zinc-200/20 rounded-t-lg">
    <a href="dashboard.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">calendar_today</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Today</span></a>
    <a href="assignments.html" class="flex flex-col items-center justify-center bg-zinc-100/10 border-2 border-zinc-50 rounded-md px-3 py-1 rotate-1 scale-110 transition-transform duration-150 text-zinc-50"><span class="material-symbols-outlined">checklist</span><span class="font-['Space_Grotesk'] text-[10px] font-bold">Tasks</span></a>
    <a href="exams.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">edit_document</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Exams</span></a>
    <a href="account.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">person</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Account</span></a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function load() {
      const res = await fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (!data.length) {
        list.innerHTML = '<div class="chalk-dashed p-10 text-center chalk-dim text-sm mt-6">📭 No assignments yet<br><span class="text-xs mt-2 block">Tap + Add to start</span></div>';
        return;
      }
      data.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
      const rots = ['rotate-1', '-rotate-1', 'rotate-0.5', '-rotate-0.5'];
      data.forEach((a, i) => {
        const r = rots[i % 4];
        list.innerHTML += `
          <div class="wobbly-box p-5 mb-4 flex justify-between items-start gap-3 transition-all hover:bg-white/5 ${r}" style="animation: fadeUp .5s cubic-bezier(0.16, 1, 0.3, 1) ${i*0.06}s both">
            <div class="flex-1 min-w-0">
              <div class="text-lg leading-tight ${a.completed ? 'line-through text-zinc-500' : 'chalk-text font-bold'}">${a.title}</div>
              <div class="text-sm chalk-dim mt-1">${a.subjectName}</div>
              <div class="text-[10px] font-bold uppercase tracking-widest mt-3 ${a.completed ? 'chalk-dim' : 'text-amber-200/80'}">⏳ Due: ${a.dueDate}</div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${!a.completed
                ? `<button class="wobbly-box px-3 py-1 text-[11px] font-bold text-emerald-300 border-emerald-400/50 bg-emerald-400/10 hover:bg-emerald-400/20 active:scale-95 transition-all" onclick="complete('${a.id}')">✓ Done</button>`
                : `<span class="border border-emerald-400/30 text-emerald-400 bg-emerald-400/5 px-3 py-1 rounded text-[11px] font-bold">✓ Done</span>`}
              <button class="w-8 h-8 flex items-center justify-center border border-white/20 rounded text-sm hover:bg-white/10 transition-colors" onclick="window.location.href='edit-assignment.html?id=${a.id}'">✏️</button>
              <button class="w-8 h-8 flex items-center justify-center border border-red-400/30 text-red-400 text-sm rounded hover:bg-red-400/10 transition-colors" onclick="del('${a.id}')">🗑</button>
            </div>
          </div>`;
      });
    }

    async function complete(id) { await fetch(`https://web-production-dc086.up.railway.app/assignments/${id}/complete`, { method: "PUT" }); load(); }
    async function del(id) { if (!confirm("Delete this assignment?")) return; await fetch(`https://web-production-dc086.up.railway.app/assignments/${id}`, { method: "DELETE" }); load(); }
    load();
  </script>
</body>
</html>
