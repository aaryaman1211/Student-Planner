<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Assignments</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --p: #6C5CE7; --bg: #F0EFFA; --card: #fff; --text: #1a1a2e; --sub: #6b7280; }
    body { font-family: -apple-system, sans-serif; background: var(--bg);
           color: var(--text); padding-bottom: 90px; }
    @keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .a1 { animation: up .35s ease both; }
    .a2 { animation: up .35s .06s ease both; }

    .header { background: white; padding: 56px 20px 20px;
              box-shadow: 0 2px 12px rgba(108,92,231,0.08); }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; font-weight: 700; }
    .add-btn { background: linear-gradient(135deg, #6C5CE7, #a29bfe);
               color: white; border: none; padding: 10px 18px;
               border-radius: 20px; font-size: 14px; font-weight: 600;
               cursor: pointer; text-decoration: none; display: inline-block;
               box-shadow: 0 4px 12px rgba(108,92,231,0.3);
               transition: transform 0.15s; }
    .add-btn:active { transform: scale(0.95); }

    .content { padding: 20px; }

    .card { background: white; border-radius: 16px; padding: 16px 18px;
            margin-bottom: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.15s; }
    .card:active { transform: scale(0.98); }
    .title   { font-size: 15px; font-weight: 600; }
    .subject { font-size: 13px; color: var(--sub); margin-top: 3px; }
    .due     { font-size: 12px; color: var(--p); margin-top: 3px; font-weight: 500; }
    .done-text { text-decoration: line-through; color: #aaa; }
    .actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .tick-btn { background: #d1fae5; border: none; padding: 8px 12px;
                border-radius: 10px; font-size: 13px; cursor: pointer;
                color: #059669; font-weight: 600; transition: transform 0.15s; }
    .tick-btn:active { transform: scale(0.92); }
    .del-btn { background: #fee2e2; border: none; padding: 8px 10px;
               border-radius: 10px; font-size: 13px; cursor: pointer;
               color: #ef4444; transition: transform 0.15s; }
    .del-btn:active { transform: scale(0.92); }
    .done-badge { background: #d1fae5; color: #059669; font-size: 12px;
                  font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .empty { text-align: center; color: var(--sub); padding: 60px 0;
             font-size: 15px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    .bnav { position: fixed; bottom: 0; left: 0; right: 0; background: white;
            border-top: 1px solid #f0efff; padding: 10px 0 24px;
            display: flex; z-index: 100; box-shadow: 0 -4px 20px rgba(108,92,231,0.08); }
    .bnav a { flex: 1; display: flex; flex-direction: column; align-items: center;
              text-decoration: none; gap: 3px; transition: transform 0.15s; }
    .bnav a:active { transform: scale(0.92); }
    .bnav-icon { font-size: 22px; }
    .bnav-label { font-size: 11px; font-weight: 500; color: var(--sub); }
    .bnav a.active .bnav-label { color: var(--p); }
  </style>
</head>
<body>
  <div class="header a1">
    <div class="header-row">
      <h1>📝 Tasks</h1>
      <a href="add-assignment.html" class="add-btn">+ Add</a>
    </div>
  </div>

  <div class="content a2" id="list"></div>

  <nav class="bnav">
    <a href="dashboard.html">
      <span class="bnav-icon">🏠</span>
      <span class="bnav-label">Home</span>
    </a>
    <a href="assignments.html" class="active">
      <span class="bnav-icon">📝</span>
      <span class="bnav-label">Tasks</span>
    </a>
    <a href="exams.html">
      <span class="bnav-icon">📅</span>
      <span class="bnav-label">Exams</span>
    </a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    async function load() {
      const res  = await fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (!data.length) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No assignments yet<br><small>Tap + Add to get started</small></div>';
        return;
      }
      // Sort: incomplete first, then by date
      data.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
      data.forEach((a, i) => {
        list.innerHTML += `
          <div class="card" style="animation: up .35s ${i*0.05}s ease both">
            <div style="flex:1;min-width:0">
              <div class="title ${a.completed ? 'done-text' : ''}">${a.title}</div>
              <div class="subject">${a.subjectName}</div>
              <div class="due">Due: ${a.dueDate}</div>
            </div>
            <div class="actions">
              ${!a.completed
                ? `<button class="tick-btn" onclick="complete('${a.id}')">✓ Done</button>`
                : `<span class="done-badge">✓ Done</span>`}
              <button class="del-btn" onclick="del('${a.id}')">🗑</button>
            </div>
          </div>`;
      });
    }

    async function complete(id) {
      await fetch(`https://web-production-dc086.up.railway.app/assignments/${id}/complete`, { method: "PUT" });
      load();
    }
    async function del(id) {
      if (!confirm("Delete this assignment?")) return;
      await fetch(`https://web-production-dc086.up.railway.app/assignments/${id}`, { method: "DELETE" });
      load();
    }
    load();
  </script>
</body>
</html>
