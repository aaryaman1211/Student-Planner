<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#141313"},fontFamily:{"body-lg":["Space Grotesk"],"h1":["Space Grotesk"],"body-sm":["Space Grotesk"],"h2":["Space Grotesk"],"label":["Space Grotesk"]}}}};</script>
  <style>
    body { background-color: #141313; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    .wobbly-box { border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 4px; position: relative; background: rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
    .wobbly-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 6px; transform: rotate(-0.5deg); pointer-events: none; }
    .chalk-dashed { border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 4px; transform: rotate(0.2deg); }
    .chalk-text { color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 2px rgba(255, 255, 255, 0.1); }
    .chalk-dim { color: rgba(255, 255, 255, 0.5); }
    .chalk-swipe { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.2) 80%, transparent); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    .animate-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="text-zinc-50 pb-32">
  <div class="pt-16 pb-8 text-center animate-up">
    <div id="avatar" class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-white/20 rotate-2 flex items-center justify-center text-5xl font-bold chalk-text bg-white/5 wobbly-box">A</div>
    <h1 id="userName" class="text-2xl font-bold chalk-text mb-1">Loading...</h1>
    <p id="userEmail" class="text-sm chalk-dim"></p>
  </div>

  <div class="max-w-screen-xl mx-auto px-6 space-y-8 animate-up" style="animation-delay: 0.1s;">
    
    <div class="grid grid-cols-3 gap-3">
      <div class="wobbly-box p-3 text-center -rotate-1">
        <div id="totalA" class="text-2xl font-bold chalk-text mb-1">—</div>
        <div class="text-[10px] chalk-dim uppercase font-bold tracking-widest">Tasks</div>
      </div>
      <div class="wobbly-box p-3 text-center rotate-1 bg-emerald-400/5">
        <div id="doneA" class="text-2xl font-bold text-emerald-400 mb-1">—</div>
        <div class="text-[10px] chalk-dim uppercase font-bold tracking-widest">Done</div>
      </div>
      <div class="wobbly-box p-3 text-center -rotate-0.5">
        <div id="totalE" class="text-2xl font-bold chalk-text mb-1">—</div>
        <div class="text-[10px] chalk-dim uppercase font-bold tracking-widest">Exams</div>
      </div>
    </div>

    <section>
      <div class="flex items-center gap-3 mb-4">
        <h2 class="text-[11px] font-bold chalk-dim uppercase tracking-widest">Personal Details</h2>
        <div class="chalk-swipe flex-1 opacity-40"></div>
      </div>
      <div class="chalk-dashed p-1">
        <div class="flex justify-between p-4 border-b border-white/10 hover:bg-white/5 transition-colors">
          <span class="font-bold chalk-text">Name</span><span id="rowName" class="chalk-dim">—</span>
        </div>
        <div class="flex justify-between p-4 hover:bg-white/5 transition-colors">
          <span class="font-bold chalk-text">Email</span><span id="rowEmail" class="chalk-dim text-sm">—</span>
        </div>
      </div>
    </section>

    <section>
      <div class="flex items-center gap-3 mb-4">
        <h2 class="text-[11px] font-bold chalk-dim uppercase tracking-widest">About App</h2>
        <div class="chalk-swipe flex-1 opacity-40"></div>
      </div>
      <div class="chalk-dashed p-1">
        <div class="flex justify-between p-4 border-b border-white/10 hover:bg-white/5 transition-colors">
          <span class="font-bold chalk-text">Version</span><span class="chalk-dim text-sm">Chalkboard UI</span>
        </div>
        <div class="flex justify-between p-4 hover:bg-white/5 transition-colors">
          <span class="font-bold chalk-text">Backend</span><span class="chalk-dim text-sm">Spring Boot</span>
        </div>
      </div>
    </section>

    <button onclick="logout()" class="w-full wobbly-box p-4 font-bold text-red-400 border-red-400/40 bg-red-400/5 hover:bg-red-400/10 hover:-rotate-1 transition-all active:scale-95 mt-4">Log Out</button>

  </div>

  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-zinc-950 border-t-4 border-zinc-200/20 rounded-t-lg">
    <a href="dashboard.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">calendar_today</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Today</span></a>
    <a href="assignments.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">checklist</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Tasks</span></a>
    <a href="exams.html" class="flex flex-col items-center justify-center text-zinc-500 opacity-70 px-3 py-1 hover:bg-zinc-800 hover:text-zinc-50 transition-colors rounded-md"><span class="material-symbols-outlined">edit_document</span><span class="font-['Space_Grotesk'] text-[10px] font-medium">Exams</span></a>
    <a href="account.html" class="flex flex-col items-center justify-center bg-zinc-100/10 border-2 border-zinc-50 rounded-md px-3 py-1 -rotate-1 scale-110 transition-transform duration-150 text-zinc-50"><span class="material-symbols-outlined">person</span><span class="font-['Space_Grotesk'] text-[10px] font-bold">Account</span></a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";
    const name = user.name || "Student"; const email = user.email || "";
    document.getElementById("avatar").textContent = name.charAt(0).toUpperCase();
    document.getElementById("userName").textContent = name;
    document.getElementById("userEmail").textContent = email;
    document.getElementById("rowName").textContent = name;
    document.getElementById("rowEmail").textContent = email;

    async function loadStats() {
      try {
        const [aRes, eRes] = await Promise.all([ fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`), fetch(`https://web-production-dc086.up.railway.app/exams/${user.uid}`) ]);
        const assignments = await aRes.json(); const exams = await eRes.json();
        document.getElementById("totalA").textContent = assignments.length;
        document.getElementById("doneA").textContent  = assignments.filter(a => a.completed).length;
        document.getElementById("totalE").textContent = exams.length;
      } catch(e) {}
    }

    async function logout() {
      if (!confirm("Are you sure you want to logout?")) return;
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js");
      const { getAuth, signOut } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js");
      const app = initializeApp({ apiKey: "AIzaSyBV0D7YQVZxwmCzF2DOqgXCwMMQCwC9eKo", authDomain: "student-planner-ca092.firebaseapp.com", projectId: "student-planner-ca092" });
      const auth = getAuth(app);
      await signOut(auth); localStorage.clear(); window.location.href = "login.html";
    }
    loadStats();
  </script>
</body>
</html>
