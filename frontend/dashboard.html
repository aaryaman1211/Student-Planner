<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Student Planner">
  <link rel="manifest" href="manifest.json">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --p: #6C5CE7; --t: #00B894; --bg: #F0EFFA; --card: #fff; --text: #1a1a2e; --sub: #6b7280; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
    @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .a1 { animation: up .4s ease both; }
    .a2 { animation: up .4s .08s ease both; }
    .a3 { animation: up .4s .16s ease both; }
    .a4 { animation: up .4s .24s ease both; }
    .a5 { animation: up .4s .32s ease both; }

    /* Header */
    .header { background: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 100%);
              padding: 56px 24px 80px; position: relative; overflow: hidden; }
    .header::after { content: ''; position: absolute; bottom: -40px; left: 0; right: 0;
                     height: 80px; background: var(--bg); border-radius: 40px 40px 0 0; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .greeting { font-size: 26px; font-weight: 700; color: white; }
    .greeting-sub { font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white;
                  padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }

    /* Stats */
    .stats { display: flex; gap: 12px; padding: 0 20px; margin-top: -24px;
             position: relative; z-index: 1; }
    .stat-card { flex: 1; background: white; border-radius: 18px;
                 padding: 16px; text-align: center;
                 box-shadow: 0 4px 20px rgba(108,92,231,0.1); }
    .stat-num { font-size: 28px; font-weight: 700; color: var(--p); }
    .stat-label { font-size: 12px; color: var(--sub); margin-top: 2px; }

    /* Content */
    .content { padding: 20px; }
    .section-title { font-size: 17px; font-weight: 700; margin-bottom: 12px;
                     color: var(--text); }

    /* Notification */
    .notif { background: #FFF8E1; border-radius: 16px; padding: 14px 16px;
             margin-bottom: 20px; border-left: 4px solid #F59E0B;
             font-size: 14px; color: #92400E; line-height: 1.6; display: none; }

    /* Cards */
    .item-card { background: white; border-radius: 16px; padding: 16px;
                 margin-bottom: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
                 display: flex; justify-content: space-between; align-items: center;
                 cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .item-card:active { transform: scale(0.98); box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .item-title { font-size: 15px; font-weight: 600; }
    .item-sub   { font-size: 13px; color: var(--sub); margin-top: 3px; }
    .item-date  { font-size: 12px; color: var(--sub); margin-top: 3px; }
    .badge { font-size: 11px; font-weight: 600; padding: 5px 12px;
             border-radius: 20px; white-space: nowrap; }
    .badge.assignment { background: #ede9fe; color: #6C5CE7; }
    .badge.exam       { background: #d1fae5; color: #059669; }
    .empty { text-align: center; color: var(--sub); padding: 24px 0;
             font-size: 14px; }

    /* Bottom nav */
    .bnav { position: fixed; bottom: 0; left: 0; right: 0; background: white;
            border-top: 1px solid #f0efff; padding: 10px 0 24px;
            display: flex; z-index: 100;
            box-shadow: 0 -4px 20px rgba(108,92,231,0.08); }
    .bnav a { flex: 1; display: flex; flex-direction: column;
              align-items: center; text-decoration: none; gap: 3px;
              transition: transform 0.15s; }
    .bnav a:active { transform: scale(0.92); }
    .bnav-icon { font-size: 22px; }
    .bnav-label { font-size: 11px; font-weight: 500; color: var(--sub); }
    .bnav a.active .bnav-label { color: var(--p); }
    .bnav a.active .bnav-icon { filter: drop-shadow(0 2px 4px rgba(108,92,231,0.3)); }
  </style>
</head>
<body>

  <div class="header a1">
    <div class="header-top">
      <div>
        <div class="greeting" id="greeting">Hello 👋</div>
        <div class="greeting-sub">Here's your planner</div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats a2">
    <div class="stat-card">
      <div class="stat-num" id="aCount">—</div>
      <div class="stat-label">Assignments</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="eCount">—</div>
      <div class="stat-label">Exams</div>
    </div>
  </div>

  <div class="content">
    <div id="notif-banner" class="notif a3"></div>

    <div class="a3">
      <div class="section-title">⏰ Next 7 days</div>
      <div id="upcoming"></div>
    </div>

    <div class="a4">
      <div class="section-title" style="margin-top:20px">📋 Later</div>
      <div id="later"></div>
    </div>
  </div>

  <nav class="bnav">
    <a href="dashboard.html" class="active">
      <span class="bnav-icon">🏠</span>
      <span class="bnav-label">Home</span>
    </a>
    <a href="assignments.html">
      <span class="bnav-icon">📝</span>
      <span class="bnav-label">Tasks</span>
    </a>
    <a href="exams.html">
      <span class="bnav-icon">📅</span>
      <span class="bnav-label">Exams</span>
    </a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    const hour = new Date().getHours();
    const greet = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
    document.getElementById("greeting").textContent = greet + ", " + (user.name || "Student") + " 👋";

    async function load() {
      try {
        const [aRes, eRes] = await Promise.all([
          fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`),
          fetch(`https://web-production-dc086.up.railway.app/exams/${user.uid}`)
        ]);
        const assignments = await aRes.json();
        const exams       = await eRes.json();

        // Stats
        document.getElementById("aCount").textContent = assignments.filter(a => !a.completed).length;
        document.getElementById("eCount").textContent = exams.length;

        // Reminders
        const today3 = new Date(); today3.setHours(0,0,0,0);
        const in3 = new Date(today3); in3.setDate(in3.getDate() + 3);
        const reminders = [];
        assignments.filter(a => !a.completed).forEach(a => {
          const d = new Date(a.dueDate);
          if (d >= today3 && d <= in3) reminders.push("📝 " + a.title + " due " + a.dueDate);
        });
        exams.forEach(e => {
          const d = new Date(e.examDate);
          if (d >= today3 && d <= in3) reminders.push("📅 " + e.title + " on " + e.examDate);
        });
        if (reminders.length) {
          const b = document.getElementById("notif-banner");
          b.style.display = "block";
          b.innerHTML = "🔔 <strong>Upcoming (3 days):</strong><br>" + reminders.map(r => "• " + r).join("<br>");
        }

        // Combined list
        const today = new Date(); today.setHours(0,0,0,0);
        const in7 = new Date(today); in7.setDate(in7.getDate() + 7);
        const items = [
          ...assignments.filter(a => !a.completed).map(a => ({
            id: a.id, title: a.title, sub: a.subjectName,
            deadline: new Date(a.dueDate), date: a.dueDate, type: "assignment"
          })),
          ...exams.map(e => ({
            id: e.id, title: e.title, sub: e.subjectName,
            deadline: new Date(e.examDate), date: e.examDate, type: "exam"
          }))
        ].sort((a, b) => a.deadline - b.deadline);

        renderList("upcoming", items.filter(i => i.deadline >= today && i.deadline <= in7));
        renderList("later",    items.filter(i => i.deadline > in7));
      } catch(e) { console.error(e); }
    }

    function renderList(id, items) {
      const div = document.getElementById(id);
      div.innerHTML = "";
      if (!items.length) { div.innerHTML = '<div class="empty">Nothing here 🎉</div>'; return; }
      items.forEach(item => {
        const link = item.type === "exam" ? `exam-detail.html?id=${item.id}` : "assignments.html";
        div.innerHTML += `
          <div class="item-card" onclick="window.location.href='${link}'">
            <div>
              <div class="item-title">${item.title}</div>
              <div class="item-sub">${item.sub}</div>
              <div class="item-date">${item.date}</div>
            </div>
            <span class="badge ${item.type}">${item.type === "exam" ? "Exam" : "Task"}</span>
          </div>`;
      });
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }
    load();
  </script>
</body>
</html>
