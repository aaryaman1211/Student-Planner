<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Planner">
  <link rel="manifest" href="manifest.json">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#0F0E17; --card:#1C1B29; --card2:#26253A; --p:#7C6FF7; --p2:#a29bfe;
            --t:#00D4A8; --t2:#55efc4; --text:#FFFFFE; --sub:#A7A9BE; --border:#2D2C44; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
           padding-bottom: max(90px, calc(70px + env(safe-area-inset-bottom))); }
    @keyframes up   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fade { from { opacity:0; } to { opacity:1; } }
    .a1 { animation: up .4s ease both; }
    .a2 { animation: up .4s .07s ease both; }
    .a3 { animation: up .4s .14s ease both; }
    .a4 { animation: up .4s .21s ease both; }

    .header { background: linear-gradient(135deg, #1a1040 0%, #241b5e 100%);
              padding: max(56px, calc(36px + env(safe-area-inset-top))) 22px 72px;
              position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -60px; right: -60px;
                      width: 200px; height: 200px; background: rgba(124,111,247,0.15);
                      border-radius: 50%; }
    .header::after { content: ''; position: absolute; bottom: -40px; left: 0; right: 0;
                     height: 80px; background: var(--bg); border-radius: 40px 40px 0 0; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start;
                  position: relative; z-index: 1; }
    .greeting { font-size: 27px; font-weight: 800; color: white; }
    .greeting-sub { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--p), var(--p2));
              border-radius: 14px; display: flex; align-items: center; justify-content: center;
              font-size: 18px; font-weight: 700; color: white; cursor: pointer;
              flex-shrink: 0; text-decoration: none; }

    .stats { display: flex; gap: 12px; padding: 0 18px; margin-top: -22px;
             position: relative; z-index: 1; }
    .stat { flex: 1; background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 16px 12px; text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .stat-num { font-size: 30px; font-weight: 800; color: var(--p); }
    .stat-label { font-size: 12px; color: var(--sub); margin-top: 3px; }

    .content { padding: 18px; }
    .section-title { font-size: 17px; font-weight: 700; color: var(--text);
                     margin-bottom: 12px; }
    .notif { background: #2a1f00; border: 1px solid #5a3e00; border-radius: 14px;
             padding: 14px 16px; margin-bottom: 20px; font-size: 14px;
             color: #FFD97D; line-height: 1.6; display: none; }

    .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px;
                 padding: 16px; margin-bottom: 10px;
                 display: flex; justify-content: space-between; align-items: center;
                 cursor: pointer; transition: transform 0.15s, background 0.15s; }
    .item-card:active { transform: scale(0.98); background: var(--card2); }
    .item-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .item-sub   { font-size: 13px; color: var(--sub); margin-top: 3px; }
    .item-date  { font-size: 12px; color: var(--sub); margin-top: 3px; }
    .badge { font-size: 11px; font-weight: 700; padding: 5px 12px;
             border-radius: 20px; white-space: nowrap; }
    .badge.assignment { background: rgba(124,111,247,0.2); color: var(--p2); }
    .badge.exam       { background: rgba(0,212,168,0.15); color: var(--t); }
    .empty { text-align: center; color: var(--sub); padding: 24px 0; font-size: 14px; }

    .bnav { position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(20,19,34,0.95); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 10px 0 max(20px, env(safe-area-inset-bottom));
            display: flex; z-index: 100; }
    .bnav a { flex: 1; display: flex; flex-direction: column; align-items: center;
              text-decoration: none; gap: 3px; transition: transform 0.15s; }
    .bnav a:active { transform: scale(0.88); }
    .bnav-icon  { font-size: 22px; }
    .bnav-label { font-size: 10px; font-weight: 600; color: var(--sub); }
    .bnav a.active .bnav-label { color: var(--p2); }
  </style>
</head>
<body>
  <div class="header a1">
    <div class="header-top">
      <div>
        <div class="greeting" id="greeting">Hello 👋</div>
        <div class="greeting-sub">Your planner</div>
      </div>
      <a href="account.html" class="avatar" id="avatar">A</a>
    </div>
  </div>

  <div class="stats a2">
    <div class="stat">
      <div class="stat-num" id="aCount">—</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="eCount">—</div>
      <div class="stat-label">Exams</div>
    </div>
  </div>

  <div class="content">
    <div id="notif-banner" class="notif a3"></div>
    <div class="a3">
      <div class="section-title">⏰ Next 7 days</div>
      <div id="upcoming"></div>
    </div>
    <div class="a4" style="margin-top:20px">
      <div class="section-title">📋 Later</div>
      <div id="later"></div>
    </div>
  </div>

  <nav class="bnav">
    <a href="dashboard.html" class="active">
      <span class="bnav-icon">🏠</span><span class="bnav-label">Home</span>
    </a>
    <a href="assignments.html">
      <span class="bnav-icon">📝</span><span class="bnav-label">Tasks</span>
    </a>
    <a href="exams.html">
      <span class="bnav-icon">📅</span><span class="bnav-label">Exams</span>
    </a>
    <a href="account.html">
      <span class="bnav-icon">👤</span><span class="bnav-label">Account</span>
    </a>
  </nav>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) window.location.href = "login.html";

    const hour = new Date().getHours();
    const greet = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
    const name = user.name || "Student";
    document.getElementById("greeting").textContent = greet + ", " + name.split(" ")[0] + " 👋";
    document.getElementById("avatar").textContent = name.charAt(0).toUpperCase();

    async function load() {
      try {
        const [aRes, eRes] = await Promise.all([
          fetch(`https://web-production-dc086.up.railway.app/assignments/${user.uid}`),
          fetch(`https://web-production-dc086.up.railway.app/exams/${user.uid}`)
        ]);
        const assignments = await aRes.json();
        const exams       = await eRes.json();

        document.getElementById("aCount").textContent = assignments.filter(a => !a.completed).length;
        document.getElementById("eCount").textContent = exams.length;

        const today3 = new Date(); today3.setHours(0,0,0,0);
        const in3    = new Date(today3); in3.setDate(in3.getDate() + 3);
        const reminders = [];
        assignments.filter(a => !a.completed).forEach(a => {
          const d = new Date(a.dueDate);
          if (d >= today3 && d <= in3) reminders.push("📝 " + a.title + " due " + a.dueDate);
        });
        exams.forEach(e => {
          const d = new Date(e.examDate);
          if (d >= today3 && d <= in3) reminders.push("📅 " + e.title + " on " + e.examDate);
        });
        if (reminders.length) {
          const b = document.getElementById("notif-banner");
          b.style.display = "block";
          b.innerHTML = "🔔 <strong>Due soon:</strong><br>" + reminders.map(r => "• " + r).join("<br>");
        }

        const today = new Date(); today.setHours(0,0,0,0);
        const in7   = new Date(today); in7.setDate(in7.getDate() + 7);
        const items = [
          ...assignments.filter(a => !a.completed).map(a => ({
            id: a.id, title: a.title, sub: a.subjectName,
            deadline: new Date(a.dueDate), date: a.dueDate, type: "assignment"
          })),
          ...exams.map(e => ({
            id: e.id, title: e.title, sub: e.subjectName,
            deadline: new Date(e.examDate), date: e.examDate, type: "exam"
          }))
        ].sort((a, b) => a.deadline - b.deadline);

        renderList("upcoming", items.filter(i => i.deadline >= today && i.deadline <= in7));
        renderList("later",    items.filter(i => i.deadline > in7));
      } catch(e) { console.error(e); }
    }

    function renderList(id, items) {
      const div = document.getElementById(id);
      div.innerHTML = "";
      if (!items.length) { div.innerHTML = '<div class="empty">Nothing here 🎉</div>'; return; }
      items.forEach(item => {
        const link = item.type === "exam" ? `exam-detail.html?id=${item.id}` : "assignments.html";
        div.innerHTML += `
          <div class="item-card" onclick="window.location.href='${link}'">
            <div>
              <div class="item-title">${item.title}</div>
              <div class="item-sub">${item.sub}</div>
              <div class="item-date">${item.date}</div>
            </div>
            <span class="badge ${item.type}">${item.type === "exam" ? "Exam" : "Task"}</span>
          </div>`;
      });
    }
    load();
  </script>
</body>
</html>
